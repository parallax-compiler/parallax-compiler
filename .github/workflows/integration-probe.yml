          using elem_t = float;
          int main(){
            std::vector<elem_t> in(64, 3.0f), out(64, 0.0f);
            benchmark_transform::transform_std(std::execution::par, in, out,
                                               [](elem_t x){ return x * 2.0f + 1.0f; });
            std::printf("transform result=%.1f expected=7.0\n", (double)out[0]);
