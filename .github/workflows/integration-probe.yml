          const auto transform_reduce_std = [](auto&& policy, const auto& input, auto init, auto f) {
              return std::transform_reduce(policy, input.cbegin(), input.cend(), init, std::plus<>(), f);
          };
          const auto sq = [](const auto& x){ return x * x; };
