          echo "registrars: $(grep -c 'parallax_kernel_register' trd_w.cpp)"; grep -aE 'ParallaxFunnel|SPIR-V words' trd2.log | head
          "$CLANGXX" -std=c++20 -O2 $INC trd_w.cpp -L parallax-runtime/out -lparallax-runtime -o trdbin 2>&1 | tail -2
