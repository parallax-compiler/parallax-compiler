          out="$(./probe_branch 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::branch kernel was not offloaded"; exit 1; }
          echo "$out" | grep -q "branch ok=1" \
            || { echo "::error::if/else produced a wrong result"; exit 1; }
          echo "PASS: if/else offloaded with structured control flow (OpSelectionMerge)"

      - name: "GATE (loop): a for-loop in a kernel (OpLoopMerge + OpPhi)"
        run: |
          # Hardening: a counted loop with a carried accumulator must lower to a
          # structured SPIR-V loop (OpLoopMerge) with OpPhi for the loop variables.
          # acc += x four times == 4*x (exact for these integer-valued floats).
          cat > probe_loop.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              const int N = 128;
              std::vector<float> v(N), ref(N);
              for (int i = 0; i < N; ++i) { v[i] = (float)i; ref[i] = 4.0f * i; }
              std::for_each(std::execution::par, v.begin(), v.end(),
                            [](float& x) { float acc = 0.0f; for (int k = 0; k < 4; ++k) acc += x; x = acc; });
              bool ok = std::equal(v.begin(), v.end(), ref.begin());
              std::printf("loop ok=%d v[1]=%.1f v[10]=%.1f\n", ok ? 1 : 0, v[1], v[10]);
              return ok ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/lp.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_loop.cpp -o /dev/null 2> lp.log || true
          if [ -f lp.spv ]; then
            spirv-val lp.spv || { echo "::error::loop SPIR-V failed validation"; exit 1; }
            spirv-dis lp.spv 2>/dev/null | grep -q "OpLoopMerge" \
              || { echo "::error::no OpLoopMerge — loop not structured"; exit 1; }
            spirv-dis lp.spv 2>/dev/null | grep -q "OpPhi" \
              || { echo "::error::no OpPhi — loop-carried variable not handled"; exit 1; }
          else
            echo "::error::no loop SPIR-V (kernel not generated — loop bailed)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_loop.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_loop 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_loop 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::loop kernel was not offloaded"; exit 1; }
          echo "$out" | grep -q "loop ok=1" \
            || { echo "::error::loop produced a wrong result"; exit 1; }
          echo "PASS: for-loop offloaded with structured control flow (OpLoopMerge + OpPhi)"

      - name: "GATE (cpu-fallback): an unsupported callable stays correct on the CPU"
        run: |
          # Hardening: a construct we can't lower (here std::cbrt, not in our GLSL map)
          # must make codegen BAIL (empty SPIR-V) so the call stays on the CPU and
          # still produces the right answer — never a silent miscompile (alias-to-arg0)
          # nor invalid SPIR-V. cbrt(27)=3, so 3*2=6.
          cat > probe_fallback.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cmath>
          #include <cstdio>
          int main() {
              std::vector<float> v(64, 27.0f);
              std::for_each(std::execution::par, v.begin(), v.end(),
                            [](float& x) { x = std::cbrt(x) * 2.0f; });
              std::printf("fallback result=%.1f expected=6.0\n", v[0]);
              return (v[0] == 6.0f) ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/fb.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_fallback.cpp -o /dev/null 2> fb.log || true
          # HARD assertions: codegen must have bailed — no SPIR-V emitted and the
          # plugin must say so. This is what proves "no silent miscompile / no
          # invalid SPIR-V" regardless of whether the CPU par-backend is present.
          if [ -f fb.spv ]; then echo "::error::emitted SPIR-V for an unsupported callable (should have bailed)"; exit 1; fi
          grep -iqE "leaving on CPU|unsupported" fb.log \
            || { echo "::error::codegen did not report the unsupported construct"; exit 1; }
          echo "[fallback] codegen bailed (no SPIR-V) as required:"; grep -iE "leaving on CPU|unsupported" fb.log | head -2
          # BEST-EFFORT: if the CPU parallel backend links (TBB present), confirm the
          # left-on-CPU call still computes the right answer (cbrt(27)*2 = 6).
          if "$CLANGXX" -std=c++20 -O2 probe_fallback.cpp \
               -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -ltbb \
               -o probe_fallback 2>/dev/null; then
            export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
            out="$(./probe_fallback 2>&1)" || true
            echo "$out" | grep -v "^\[" | head
            echo "$out" | grep -q "fallback result=6.0" \
              || { echo "::error::unsupported callable produced a wrong result on CPU (silent miscompile)"; exit 1; }
            echo "PASS: unsupported callable bailed AND ran correctly on the CPU (cbrt result=6.0)"
          else
            echo "PASS: unsupported callable bailed to CPU (no SPIR-V emitted); CPU par-backend not linkable here, runtime check skipped"
          fi

