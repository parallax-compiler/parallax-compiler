          [ "$H0" = "$(sha256sum kern.h|cut -d' ' -f1)" ] || { echo "::error::header kern.h was MODIFIED on disk"; exit 1; }
          [ "$S0" = "$(sha256sum sp.cpp|cut -d' ' -f1)" ] || { echo "::error::source sp.cpp was MODIFIED on disk"; exit 1; }
          nm sp.o | grep -q "plx_funnel\|kernel_register" || { echo "::error::shadow-rewritten object has no registrar (routing/funnel lost through overlay)"; exit 1; }
          "$CLANGXX" -std=c++20 -O2 sp.o -L ../parallax-runtime/out -lparallax-runtime -o sp 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/../parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./sp 2>&1)" || true
          echo "$out" | grep -aE "sp result=|Successfully loaded kernel|MISS" | head
          echo "$out" | grep -q "Successfully loaded kernel" || { echo "::error::shadow-built binary did not offload"; exit 1; }
          echo "$out" | grep -q "sp result=3.0" || { echo "::error::shadow-built binary wrong result"; exit 1; }
          echo "PASS: parallax-cxx offloaded via shadow tree; original source + header byte-identical on disk"

      - name: "GATE (parallel-shared-header): concurrent wrapper compiles of a shared header (no -j1)"
        run: |
          # Phase 1: two TUs including the SAME header (both with a par call) compiled
          # CONCURRENTLY through the wrapper. In-place rewriting would clobber the shared
          # header mid-build; per-TU shadow trees make this safe. Both objects must carry
          # a registrar and the header must stay pristine.
          mkdir -p parg && cd parg
          cat > shared.h <<'EOF'
