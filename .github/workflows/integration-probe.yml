          # The registrar's static-init call to the extern-C parallax_kernel_register is the
          # reliable (unmangled) marker that a kernel was funneled in. Demangled funnel-array
          # count catches double application (a re-run appending a second registrar).
          for o in rr1.o rr2.o; do
