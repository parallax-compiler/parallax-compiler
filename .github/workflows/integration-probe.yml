          echo "PASS: std::unique(par) offloaded GPU duplicate removal"

      - name: "GATE (partition): reorder pred-true to the front on the GPU"
        run: |
          # std::partition: flags(pred) -> scan -> partition scatter (kept to the
          # front at pos-1, the rest after at num_true + i - pos). Even numbers first
          # over [0..999] -> partition point 500; first 500 even, last 500 odd.
          cat > probe_partition.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <iterator>
          #include <cstdio>
          int main() {
              const int N = 1000;
              std::vector<int> v(N);
              for (int i = 0; i < N; ++i) v[i] = i;
              auto pp = std::partition(std::execution::par, v.begin(), v.end(),
                                       [](int x){ return x % 2 == 0; });
              size_t nt = (size_t)std::distance(v.begin(), pp);
              bool ok = (nt == 500);
              for (int i = 0; i < 500 && ok; ++i) if (v[i] % 2 != 0) ok = false;
              for (int i = 500; i < N && ok; ++i) if (v[i] % 2 == 0) ok = false;
              std::printf("partition pp=%zu groups_ok=%d\n", nt, ok ? 1 : 0);
              return ok ? 0 : 1;
