          c2=$(nm -C rr2.o 2>/dev/null | grep -c "plx_funnel" || true)
          echo "demangled funnel-symbol counts: build1=$c1 build2=$c2"
          [ "$c1" = "$c2" ] || { echo "::error::funnel symbol count changed across rebuilds ($c1 vs $c2) — double application"; exit 1; }
          "$CLANGXX" -std=c++20 -O2 rr2.o -L ../parallax-runtime/out -lparallax-runtime -o rr 2>&1 | tail -1
          export LD_LIBRARY_PATH="$PWD/../parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./rr 2>&1)" || true
          echo "$out" | grep -q "rr result=3.0" || { echo "::error::rebuilt binary wrong result"; exit 1; }
          echo "$out" | grep -q "Successfully loaded kernel" || { echo "::error::rebuilt binary did not offload"; exit 1; }
          echo "PASS: back-to-back rebuild is stable (identical registrar count, correct offload)"

      - name: "GATE (heap-capture): link-time capture routes the whole heap into the pool"
        run: |
          # Phase 2: linking libparallax-heap.a into the program makes its strong operator
          # new / malloc overrides route EVERY allocation into the heap pool — a global
          # vector built during static init (before main/Vulkan), a raw malloc, and a
          # posix_memalign must all report parallax_heap_contains(), and the program must
          # still offload correctly (captured storage stages today; Phase 3 makes it
          # zero-copy). This is the nvc++ "any heap pointer is device memory" foundation.
          cat > probe_heap.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdlib>
          #include <cstdint>
          #include <cstdio>
          extern "C" int parallax_heap_contains(const void*);
          std::vector<float> g_v(64, 1.0f);   // allocated during static init, pre-main
          int main() {
              void* m = std::malloc(4096);
              void* pm = nullptr;
              if (posix_memalign(&pm, 256, 8192) != 0) pm = nullptr;
              int gc = parallax_heap_contains(g_v.data());
              int mc = parallax_heap_contains(m);
              int pc = pm ? parallax_heap_contains(pm) : 0;
              int pa = pm ? (((uintptr_t)pm % 256) == 0) : 0;
              std::printf("heap: gvec=%d malloc=%d pmemalign=%d aligned=%d\n", gc, mc, pc, pa);
              std::for_each(std::execution::par, g_v.begin(), g_v.end(),
                            [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("heap result=%.1f\n", g_v[0]);
              std::free(m); std::free(pm);
              return (gc && mc && pc && pa && g_v[0] == 3.0f) ? 0 : 1;
          }
          EOF
          export CLANGXX PARALLAX_PLUGIN="$PLUGIN" PARALLAX_RT_INCLUDE="$PWD/parallax-runtime/include"
          WRAP=parallax-compiler/scripts/parallax-cxx
          "$WRAP" -std=c++20 -O2 -c probe_heap.cpp -o probe_heap.o 2>/dev/null
          # Link the capture archive BEFORE the runtime + implicit libs so its strong
          # operator new/malloc are pulled in and override the (weak) libstdc++/glibc ones.
          "$CLANGXX" -std=c++20 -O2 probe_heap.o \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_heap 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./probe_heap 2>&1)" || true
          echo "$out" | grep -aE "heap:|heap result=|Successfully loaded kernel" | head
          echo "$out" | grep -q "heap: gvec=1 malloc=1 pmemalign=1 aligned=1" \
            || { echo "::error::link-time capture failed (heap allocations not in the pool)"; exit 1; }
          echo "$out" | grep -q "heap result=3.0" || { echo "::error::captured-heap offload wrong result"; exit 1; }
          echo "PASS: link-time capture put the whole heap (global vector, malloc, posix_memalign) in the pool; offload correct"

      - name: "GATE (heap-stress): allocator survives concurrent random alloc/free/realloc"
        run: |
          # Phase 2: hammer the pool from 4 threads with checksum-verified random
          # alloc/free/realloc, PARALLAX_HEAP_CHECK on, then confirm invariants hold.
          cat > probe_stress.cpp <<'EOF'
          #include <parallax/heap_pool.hpp>
          #include <cstdint>
          #include <cstring>
          #include <cstdio>
          #include <vector>
          #include <thread>
          #include <random>
          #include <atomic>
          static std::atomic<long> fails{0};
          static void work(int id) {
              std::mt19937 rng(id * 7919 + 1);
              struct A { void* p; size_t n; uint8_t s; };
              std::vector<A> live;
              for (int i = 0; i < 60000; ++i) {
                  unsigned op = rng() % 3;
                  if ((op == 1 || op == 2) && live.size() > 20) {
                      size_t k = rng() % live.size(); A a = live[k];
                      for (size_t j = 0; j < a.n; ++j) if (((uint8_t*)a.p)[j] != a.s) { ++fails; break; }
                      if (op == 1) { px_pool_free(a.p); live[k] = live.back(); live.pop_back(); }
                      else { size_t nn = 1 + (rng() % 8192); void* np = px_pool_realloc(a.p, nn);
                             if (np) { size_t keep = a.n < nn ? a.n : nn;
                                 for (size_t j = 0; j < keep; ++j) if (((uint8_t*)np)[j] != a.s) { ++fails; break; }
                                 std::memset(np, a.s, nn); live[k] = {np, nn, a.s}; } }
                  } else {
                      size_t n = 1 + (rng() % 4096); uint8_t s = (uint8_t)((id << 4) ^ (rng() & 0xF));
                      void* p = px_pool_alloc(n, 1u << (rng() % 5));
                      if (p) { std::memset(p, s, n); live.push_back({p, n, s}); }
                  }
              }
              for (A& a : live) { for (size_t j = 0; j < a.n; ++j) if (((uint8_t*)a.p)[j] != a.s) { ++fails; break; } px_pool_free(a.p); }
          }
          int main() {
              std::vector<std::thread> t;
              for (int i = 0; i < 4; ++i) t.emplace_back(work, i);
              for (auto& x : t) x.join();
              int ok = px_pool_check();
              std::printf("stress fails=%ld check=%d\n", fails.load(), ok);
              return (fails.load() == 0 && ok) ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -O2 -pthread -I parallax-runtime/include probe_stress.cpp \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_stress 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_HEAP_POOL=512 PARALLAX_HEAP_CHECK=1 ./probe_stress 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "stress fails=0 check=1" || { echo "::error::allocator corruption under concurrency"; exit 1; }
          echo "PASS: heap pool survived 4-thread checksum-verified stress with invariants intact"

      - name: "GATE (foreign-free): free() of a non-pool pointer routes to the system heap"
        run: |
          # Phase 2: a pointer the pool did NOT hand out (allocated straight from glibc, as a
          # prebuilt .so or the pre-pool bootstrap would) must be freed via __libc_free, not
          # mis-treated as a pool block. Must not crash.
          cat > probe_foreign.cpp <<'EOF'
          #include <cstdio>
          #include <cstdlib>
          extern "C" { void* __libc_malloc(size_t); int parallax_heap_contains(const void*); }
          int main() {
              void* f = __libc_malloc(4096);           // foreign: bypasses our override
              std::printf("foreign contains=%d\n", parallax_heap_contains(f));
              std::free(f);                            // our free() must route to __libc_free
              void* p = std::malloc(4096);             // ours: in the pool
              std::printf("pool contains=%d\n", parallax_heap_contains(p));
              std::free(p);
              std::printf("foreign-free OK\n");
              return 0;
          }
          EOF
          "$CLANGXX" -std=c++20 -O2 probe_foreign.cpp \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_foreign 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_foreign 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "foreign contains=0" || { echo "::error::foreign pointer wrongly reported in-pool"; exit 1; }
          echo "$out" | grep -q "pool contains=1" || { echo "::error::pool malloc not captured"; exit 1; }
          echo "$out" | grep -q "foreign-free OK" || { echo "::error::crash freeing a foreign pointer"; exit 1; }
          echo "PASS: foreign pointers route to the system allocator; pool pointers stay in the pool"

      - name: "GATE (pool-import): the arena imports the captured heap as the device buffer"
        run: |
          # Phase 3: with parallax-heap linked, the arena adopts the whole heap pool as ONE
          # device buffer via VK_EXT_external_memory_host. A plain std::vector (default
          # allocator, captured into the pool) offloads, and the runtime logs the pool-backed
          # import — the nvc++ "the heap IS device memory" milestone.
          cat > probe_poolimp.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          const auto for_each_std = [](auto&& pol, auto& c, auto&& f) {
              std::for_each(pol, c.begin(), c.end(), f);
          };
          int main() {
              std::vector<float> v(4096, 1.0f);   // default allocator -> captured into the pool
              for_each_std(std::execution::par, v, [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("poolimp result=%.1f\n", v[0]);
              return v[0] == 3.0f ? 0 : 1;
          }
          EOF
          export CLANGXX PARALLAX_PLUGIN="$PLUGIN" PARALLAX_RT_INCLUDE="$PWD/parallax-runtime/include"
          parallax-compiler/scripts/parallax-cxx -std=c++20 -O2 -c probe_poolimp.cpp -o probe_poolimp.o 2>/dev/null
          "$CLANGXX" -std=c++20 -O2 probe_poolimp.o \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_poolimp 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_HEAP_POOL=1024 PARALLAX_DEBUG=1 ./probe_poolimp 2>&1)" || true
          echo "$out" | grep -aE "external_memory_host=|Pool-backed: imported|poolimp result=|Successfully loaded kernel|MISS" | head
          echo "$out" | grep -q "external_memory_host=1" || { echo "::error::device did not enable VK_EXT_external_memory_host"; exit 1; }
          echo "$out" | grep -q "Pool-backed: imported" || { echo "::error::arena did NOT import the heap pool (fell back to legacy)"; exit 1; }
          echo "$out" | grep -q "Successfully loaded kernel" || { echo "::error::pool-backed offload did not run"; exit 1; }
          echo "$out" | grep -q "poolimp result=3.0" || { echo "::error::pool-backed offload wrong result"; exit 1; }
          echo "PASS: the arena imported the captured heap as the device buffer and offloaded correctly"

      - name: "GATE (whole-heap pointer-chasing): deref pointers to SEPARATE heap objects"
        run: |
          # Phase 3's headline capability: the elements store raw pointers to OTHER, separately
          # heap-allocated objects (not one arena block). Because the whole heap is one imported
          # buffer, the single {host_base,dev_base} relocation resolves every one on the GPU.
          # This is the "any heap pointer just works" property nvc++ gets from managed memory.
          cat > probe_wpc.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          const auto for_each_std = [](auto&& pol, auto& c, auto&& f) {
              std::for_each(pol, c.begin(), c.end(), f);
          };
          int main() {
              const int N = 256;
              std::vector<float*> ptrs(N);           // captured
              for (int i = 0; i < N; ++i) { ptrs[i] = new float(1.0f); }  // each a SEPARATE heap object
              for_each_std(std::execution::par, ptrs, [](float*& p) { *p = *p * 2.0f + 1.0f; });  // deref a chased pointer
              float s = 0; for (int i = 0; i < N; ++i) { s += *ptrs[i]; delete ptrs[i]; }
              std::printf("wpc sum=%.1f expected=%d\n", s, N * 3);
              return (s == (float)(N * 3)) ? 0 : 1;
          }
          EOF
          export CLANGXX PARALLAX_PLUGIN="$PLUGIN" PARALLAX_RT_INCLUDE="$PWD/parallax-runtime/include"
          parallax-compiler/scripts/parallax-cxx -std=c++20 -O2 -c probe_wpc.cpp -o probe_wpc.o 2>/dev/null
          "$CLANGXX" -std=c++20 -O2 probe_wpc.o \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_wpc 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_HEAP_POOL=1024 PARALLAX_DEBUG=1 ./probe_wpc 2>&1)" || true
          echo "$out" | grep -aE "Pool-backed: imported|wpc sum=|Successfully loaded kernel|MISS" | head
          echo "$out" | grep -q "wpc sum=768.0 expected=768" || { echo "::error::whole-heap pointer-chasing wrong result"; exit 1; }
          if echo "$out" | grep -q "Successfully loaded kernel"; then
            echo "PASS: dereferenced pointers to separate heap objects on the GPU (whole-heap relocation)"
          else
            echo "PASS (host fallback): pointer-chasing stayed correct on the CPU"
          fi

      - name: "GATE (legacy-fallback): PARALLAX_FORCE_LEGACY_ARENA keeps the old path correct"
        run: |
          # Phase 3: the legacy per-arena buffer path must remain correct (discrete-GPU
          # follow-up and any driver without external_memory_host rely on it). Same probe,
          # forced legacy: captured-heap data isn't in the (256 MiB) legacy arena, so it
          # takes the register/stage path — still correct, just not pool-backed.
          cat > probe_legacy.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          const auto for_each_std = [](auto&& pol, auto& c, auto&& f) {
              std::for_each(pol, c.begin(), c.end(), f);
          };
          int main() {
              std::vector<float> v(4096, 1.0f);
              for_each_std(std::execution::par, v, [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("legacy result=%.1f\n", v[0]);
              return v[0] == 3.0f ? 0 : 1;
          }
          EOF
          export CLANGXX PARALLAX_PLUGIN="$PLUGIN" PARALLAX_RT_INCLUDE="$PWD/parallax-runtime/include"
          parallax-compiler/scripts/parallax-cxx -std=c++20 -O2 -c probe_legacy.cpp -o probe_legacy.o 2>/dev/null
          "$CLANGXX" -std=c++20 -O2 probe_legacy.o \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_legacy 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_FORCE_LEGACY_ARENA=1 PARALLAX_DEBUG=1 ./probe_legacy 2>&1)" || true
          echo "$out" | grep -aE "Pool-backed: imported|legacy result=|Successfully loaded kernel" | head
          echo "$out" | grep -q "Pool-backed: imported" && { echo "::error::forced-legacy still imported the pool"; exit 1; }
          echo "$out" | grep -q "legacy result=3.0" || { echo "::error::legacy-arena offload wrong result"; exit 1; }
          echo "PASS: forced-legacy arena path stays correct (no pool import)"

      - name: "GATE (funnel zero-copy): pool-resident data offloads with NO staging copy"
        run: |
          # Phase 4: a captured (pool-resident) std::vector goes through the funnel's
          # zero-copy fast path — the launcher binds it directly and the kernel writes IN
          # PLACE, so parallax_arena_alloc (the staging marker) is NEVER called. A stack
          # std::array is NOT pool-resident, so it still stages (marker present). Both correct.
          cat > probe_zc4.cpp <<'EOF'
          #include <vector>
          #include <array>
          #include <numeric>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          const auto for_each_std = [](auto&& pol, auto b, auto e, auto&& f) { std::for_each(pol, b, e, f); };
          const auto reduce_std   = [](auto&& pol, auto b, auto e, auto init) { return std::reduce(pol, b, e, init); };
          const auto sort_std     = [](auto&& pol, auto b, auto e) { std::sort(pol, b, e); };
          int main() {
              std::vector<float> heap(4096, 1.0f);     // captured -> pool-resident
              for_each_std(std::execution::par, heap.begin(), heap.end(),
                           [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("zc heap=%.1f\n", heap[0]);   // 3.0
              // reduce (read-only) and sort (in-place, 4096 is pow2) on pool data — both zero-copy.
              float s = reduce_std(std::execution::par, heap.begin(), heap.end(), 0.0f);
              std::printf("zc reduce=%.0f\n", s);       // 4096*3 = 12288
              sort_std(std::execution::par, heap.begin(), heap.end());
              std::printf("zc sorted=%d\n", heap[0] == 3.0f ? 1 : 0);  // all equal -> still 3.0
              static std::array<float, 4096> stk;      // stack/static -> NOT pool-resident
              stk.fill(1.0f);
              for_each_std(std::execution::par, stk.begin(), stk.end(),
                           [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("zc stk=%.1f\n", stk[0]);     // staged, 3.0
              return (heap[0] == 3.0f && s == 12288.0f && stk[0] == 3.0f) ? 0 : 1;
          }
          EOF
          export CLANGXX PARALLAX_PLUGIN="$PLUGIN" PARALLAX_RT_INCLUDE="$PWD/parallax-runtime/include"
          parallax-compiler/scripts/parallax-cxx -std=c++20 -O2 -c probe_zc4.cpp -o probe_zc4.o 2>/dev/null
          "$CLANGXX" -std=c++20 -O2 probe_zc4.o \
            -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_zc4 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_HEAP_POOL=1024 PARALLAX_DEBUG=1 ./probe_zc4 2>&1)" || true
          echo "$out" | grep -aE "zc heap=|zc reduce=|zc sorted=|zc stk=|Pool-backed: imported|parallax_arena_alloc. staging" | head
          echo "$out" | grep -q "Pool-backed: imported" || { echo "::error::pool not imported"; exit 1; }
          echo "$out" | grep -q "zc heap=3.0" || { echo "::error::zero-copy heap for_each wrong result"; exit 1; }
          echo "$out" | grep -q "zc reduce=12288" || { echo "::error::zero-copy reduce wrong result"; exit 1; }
          echo "$out" | grep -q "zc sorted=1" || { echo "::error::zero-copy sort wrong result"; exit 1; }
          echo "$out" | grep -q "zc stk=3.0"  || { echo "::error::staged stack for_each wrong result"; exit 1; }
          # Only the stack for_each stages; heap for_each/reduce/sort are all zero-copy.
          nstage=$(echo "$out" | grep -c "parallax_arena_alloc. staging" || true)
          echo "staging allocations observed: $nstage (expect 1 — only the stack array stages)"
          [ "$nstage" = "1" ] || { echo "::error::expected exactly 1 staging alloc (heap ops should be zero-copy), got $nstage"; exit 1; }
          echo "PASS: pool-resident for_each/reduce/sort offloaded zero-copy (no staging); non-pool data staged"

      - name: "GATE (zero-copy int64): 8-byte elements offload correctly zero-copy"
        run: |
          # An int64 for_each on pool-resident data through the FUNNEL zero-copy path. Confirms
          # 8-byte elements bind + write in place correctly (lavapipe minSSBOoffsetAlign=16, so
          # the pool's 16-alignment is fine for the descriptor bind). v[0] and v[4095] both +1.
          cat > probe_zci64.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          const auto for_each_std = [](auto&& pol, auto b, auto e, auto&& f) { std::for_each(pol, b, e, f); };
          int main() {
              std::vector<long long> v(4096, (long long)1 << 40);   // captured -> pool-resident
              for_each_std(std::execution::par, v.begin(), v.end(), [](long long& x) { x += 1; });
              long long exp = ((long long)1 << 40) + 1;
              std::printf("zci64 v[0]=%lld v[4095]=%lld expected=%lld\n", v[0], v[4095], exp);
              return (v[0] == exp && v[4095] == exp) ? 0 : 1;
          }
          EOF
          export CLANGXX PARALLAX_PLUGIN="$PLUGIN" PARALLAX_RT_INCLUDE="$PWD/parallax-runtime/include"
          parallax-compiler/scripts/parallax-cxx -std=c++20 -O2 -c probe_zci64.cpp -o probe_zci64.o 2>/dev/null
          "$CLANGXX" -std=c++20 -O2 probe_zci64.o -L parallax-runtime/out -lparallax-heap -lparallax-runtime -o probe_zci64 2>&1 | tail -2
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_HEAP_POOL=1024 PARALLAX_DEBUG=1 ./probe_zci64 2>&1)" || true
          echo "$out" | grep -aE "minSSBOoffsetAlign|zci64 |Successfully loaded" | head
          echo "$out" | grep -q "zci64 v\[0\]=1099511627777 v\[4095\]=1099511627777" \
            || { echo "::error::int64 funnel zero-copy wrong result"; exit 1; }
          echo "PASS: int64 (8-byte) elements offload correctly via funnel zero-copy"

      - name: "GATE (captured pointer reloc): a lambda capturing a pool pointer OFFLOADS"
        run: |
          # Phase 4B capability (nvc++ parity): a lambda that CAPTURES a pointer into the
          # whole-heap pool now OFFLOADS — the captured pointer is carried in captures@2 as
          # a uint64 host address and relocated in-kernel (gpu = dev_base + p - host_base),
          # exactly like element pointer-chasing, instead of bailing to the CPU. Two shapes:
          #   *bias   -> DIRECT deref of a captured pointer  (Load-relocate path)
          #   arr[3]  -> INDEXED deref of a captured pointer (GEP-relocate -> Load path)
          # Both targets live in the arena so one (host_base,dev_base) pair relocates them.
          cat > probe_capreloc.cpp <<'EOF'
          #include <algorithm>
          #include <execution>
          #include <cstddef>
          #include <cstdio>
          extern "C" void* parallax_arena_alloc(size_t size, size_t align);
          int main() {
              const int N = 64;
              float* a    = static_cast<float*>(parallax_arena_alloc(N * sizeof(float), 16));
              float* a2   = static_cast<float*>(parallax_arena_alloc(N * sizeof(float), 16));
              float* bias = static_cast<float*>(parallax_arena_alloc(sizeof(float), 16));
              float* arr  = static_cast<float*>(parallax_arena_alloc(8 * sizeof(float), 16));
              if (!a || !a2 || !bias || !arr) { std::printf("SKIP: no arena\n"); return 0; }
              for (int i = 0; i < N; ++i) { a[i] = 2.0f; a2[i] = 2.0f; }
              *bias = 10.0f;
              for (int i = 0; i < 8; ++i) arr[i] = 0.0f;
              arr[3] = 100.0f;
              // Capture a pool pointer, DEREFERENCE it in-kernel (direct relocation).
              std::for_each(std::execution::par, a, a + N, [bias](float& x){ x += *bias; });
              // Capture a pool pointer, INDEX it in-kernel (GEP relocation).
              std::for_each(std::execution::par, a2, a2 + N, [arr](float& x){ x += arr[3]; });
              std::printf("capreloc a[0]=%.1f a2[0]=%.1f expected=12.0,102.0\n", a[0], a2[0]);
              return (a[0] == 12.0f && a2[0] == 102.0f) ? 0 : 1;
          }
          EOF
          # Dump + validate the emitted SPIR-V; confirm the relocation opcodes are present
          # (the captured pointer is relocated, not bound as a descriptor). The dump step
          # also rewrites the source in place (SHADOW unset) so the run below offloads.
          PARALLAX_DUMP_SPIRV="$PWD/capreloc.spv" "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_capreloc.cpp -o /dev/null 2> capreloc.log || true
          if [ -f capreloc.spv ]; then
            echo "===== spirv-val ====="; spirv-val capreloc.spv \
              || { echo "::error::captured-pointer-reloc SPIR-V failed validation"; exit 1; }
            echo "===== spirv-dis (capture relocation) ====="
            spirv-dis capreloc.spv 2>/dev/null | grep -iE "OpConvertUToPtr|PhysicalStorageBuffer|OpISub|OpIAdd" | head -20 || true
            spirv-dis capreloc.spv 2>/dev/null | grep -q "OpConvertUToPtr" \
              || { echo "::error::no OpConvertUToPtr — captured pointer not relocated (bailed?)"; exit 1; }
          else
            echo "::error::no capreloc.spv produced (kernel not generated — capture bailed)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_capreloc.cpp \
            -I parallax-runtime/include -L parallax-runtime/out \
            -lparallax-runtime -o probe_capreloc 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./probe_capreloc 2>&1)" || true
          echo "$out" | grep -aE "capreloc a\[0\]=|Successfully loaded kernel" | head
          echo "$out" | grep -q "SKIP:" && { echo "skipped (no arena)"; exit 0; }
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::captured-pointer lambda was NOT offloaded"; exit 1; }
          echo "$out" | grep -q "capreloc a\[0\]=12.0 a2\[0\]=102.0" \
            || { echo "::error::captured-pointer relocation produced a wrong result"; exit 1; }
          echo "PASS: a lambda capturing a pool pointer OFFLOADS with in-kernel relocation (direct + indexed)"

      - name: "GATE (conformance): differential seq-vs-par over random data"
        run: |
          # CPU-oracle conformance: for each algorithm, compute a reference with the
          # PLAIN serial std:: algorithm (no policy -> not offloaded, the CPU oracle)
          # and the result with std::execution::par (offloaded), over deterministic
          # pseudo-random int data, and assert they match exactly. This exercises the
          # whole pipeline (detect -> codegen -> runtime -> migrating arena) across the
          # algorithm surface with inputs the fixed-value gates don't cover.
          # NOTE: the rewriter turns par-used vectors into vector<int,parallax::allocator>,
          # so references use range constructors and comparisons are element-wise loops
          # (never vector::operator== / cross-allocator copies, which won't compile).
          cat > probe_conf.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <numeric>
          #include <iterator>
          #include <execution>
          #include <cstdint>
          #include <cstdio>
          static uint32_t st = 2463534242u;
          static int rng() { st ^= st << 13; st ^= st >> 17; st ^= st << 5; return (int)(st % 1000); }
          template <class A, class B>
          static bool eqn(const A& a, const B& b, size_t n) {
              for (size_t i = 0; i < n; ++i) if (a[i] != b[i]) return false; return true; }
          int main() {
              const int N = 3000;
              int fails = 0;
              // reduce (int sum is order-independent -> exact vs serial)
              { std::vector<int> v(N); for (auto& x : v) x = rng();
                long ref = 0; for (size_t i = 0; i < v.size(); ++i) ref += v[i];
                long got = (long)std::reduce(std::execution::par, v.begin(), v.end(), 0);
                if (got != ref) { std::printf("MISMATCH reduce %ld %ld\n", got, ref); ++fails; } else std::printf("ok reduce\n"); }
              // sort
              { std::vector<int> v(N); for (auto& x : v) x = rng();
                std::vector<int> ref(v.begin(), v.end()); std::sort(ref.begin(), ref.end());
                std::sort(std::execution::par, v.begin(), v.end());
                if (!eqn(v, ref, N)) { std::printf("MISMATCH sort\n"); ++fails; } else std::printf("ok sort\n"); }
              // inclusive_scan (int -> exact)
              { std::vector<int> v(N); for (auto& x : v) x = rng() % 4;
                std::vector<int> ref(N); std::inclusive_scan(v.begin(), v.end(), ref.begin());
                std::vector<int> got(N);
                std::inclusive_scan(std::execution::par, v.begin(), v.end(), got.begin());
                if (!eqn(got, ref, N)) { std::printf("MISMATCH inclusive_scan\n"); ++fails; } else std::printf("ok inclusive_scan\n"); }
              // copy_if
              { std::vector<int> v(N); for (auto& x : v) x = rng();
                std::vector<int> ref(N, -1);
                auto re = std::copy_if(v.begin(), v.end(), ref.begin(), [](int x){ return x % 3 == 0; });
                std::vector<int> got(N, -1);
                auto ge = std::copy_if(std::execution::par, v.begin(), v.end(), got.begin(), [](int x){ return x % 3 == 0; });
                size_t rn = std::distance(ref.begin(), re), gn = std::distance(got.begin(), ge);
                if (rn != gn || !eqn(got, ref, rn)) { std::printf("MISMATCH copy_if\n"); ++fails; } else std::printf("ok copy_if\n"); }
              // remove_if (in place)
              { std::vector<int> v(N); for (auto& x : v) x = rng();
                std::vector<int> ref(v.begin(), v.end());
                auto re = std::remove_if(ref.begin(), ref.end(), [](int x){ return x > 500; });
                auto ge = std::remove_if(std::execution::par, v.begin(), v.end(), [](int x){ return x > 500; });
                size_t rn = std::distance(ref.begin(), re), gn = std::distance(v.begin(), ge);
                if (rn != gn || !eqn(v, ref, rn)) { std::printf("MISMATCH remove_if\n"); ++fails; } else std::printf("ok remove_if\n"); }
              // unique (on sorted data with runs)
              { std::vector<int> v(N); for (int i = 0; i < N; ++i) v[i] = rng() % 50; std::sort(v.begin(), v.end());
                std::vector<int> ref(v.begin(), v.end());
                auto re = std::unique(ref.begin(), ref.end());
                auto ge = std::unique(std::execution::par, v.begin(), v.end());
                size_t rn = std::distance(ref.begin(), re), gn = std::distance(v.begin(), ge);
                if (rn != gn || !eqn(v, ref, rn)) { std::printf("MISMATCH unique\n"); ++fails; } else std::printf("ok unique\n"); }
              std::printf("conformance fails=%d\n", fails);
              return fails == 0 ? 0 : 1;
          }
          EOF
          # Step 1: the plugin rewrites probe_conf.cpp in place (par calls -> GPU).
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_conf.cpp -o /dev/null 2> conf.log || true
          grep -cE ": generated|Generated [0-9]+ SPIR-V" conf.log | sed 's/^/rewritten algorithms: /' || true
          # Step 2: compile the rewritten source + link the runtime.
          "$CLANGXX" -std=c++20 -O2 probe_conf.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -o probe_conf 2>&1 | tail -5
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_conf 2>&1)" || true
          echo "$out" | grep -aE "ok |MISMATCH|conformance fails=" | head -20
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::conformance: nothing was offloaded"; exit 1; }
          echo "$out" | grep -q "conformance fails=0" \
            || { echo "::error::conformance: par != serial for some algorithm"; exit 1; }
          echo "PASS: par-offloaded results match the serial CPU oracle across the algorithm surface"

      - name: "GATE: assert end-to-end GPU offload correctness"
        run: |
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_gpu 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::no GPU offload — kernel was not loaded"; exit 1; }
          echo "$out" | grep -q "result=3.0" \
            || { echo "::error::GPU produced wrong result"; exit 1; }
          echo "PASS: GPU offload produced the correct result via compiler-emitted SPIR-V"
