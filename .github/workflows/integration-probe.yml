      - name: "GATE (any/all/none_of): predicate quantifiers on the GPU"
        run: |
          # any_of=count>0, all_of=count==n, none_of=count==0. All four quantifier
          # calls live in ONE binary (multiple reduce-family orchestrations per
          # program). v[i]=i over [0,100): a(any x>98.5)=1 b(all x>=0)=1
          # c(none x>200)=1 d(all x>50)=0.
          cat > probe_of.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(100);
              for (int i = 0; i < 100; ++i) v[i] = static_cast<float>(i);
              bool a = std::any_of (std::execution::par, v.begin(), v.end(), [](float x){ return x > 98.5f; });
              bool b = std::all_of (std::execution::par, v.begin(), v.end(), [](float x){ return x >= 0.0f; });
              bool c = std::none_of(std::execution::par, v.begin(), v.end(), [](float x){ return x > 200.0f; });
              bool d = std::all_of (std::execution::par, v.begin(), v.end(), [](float x){ return x > 50.0f; });
