          cp tr.cpp trw.cpp
          PARALLAX_TRANSPARENT=1 "$CLANGXX" -std=c++20 $INC $PLG -c trw.cpp -o /dev/null 2>t1.log || true
          echo "routed: $(grep -c 'parallax::transform' /tmp/pstlb/include/pstl/benchmarks/transform/transform_std.h)"; grep -aE 'ParallaxRoute' t1.log | head
          PARALLAX_TRANSPARENT=1 "$CLANGXX" -std=c++20 $INC $PLG -c trw.cpp -o /dev/null 2>t2.log || true
          echo "registrars: $(grep -c 'parallax_kernel_register' trw.cpp)"; grep -aE 'ParallaxFunnel|SPIR-V words' t2.log | head
          "$CLANGXX" -std=c++20 -O2 $INC trw.cpp -L parallax-runtime/out -lparallax-runtime -o trbin 2>&1 | tail -3
          o="$(PARALLAX_DEBUG=1 ./trbin 2>&1)" || true
          echo "$o" | grep -aE "transform result=|Successfully loaded kernel|MISS" | head
          echo "$o" | grep -q "Successfully loaded kernel" || { echo "::error::transform not offloaded"; exit 1; }
          echo "$o" | grep -q "transform result=7.0" || { echo "::error::transform wrong result"; exit 1; }
          echo "PASS: real pSTL-Bench transform_std offloaded (2-buffer map) + verified"

      - name: "GATE (pSTL-Bench reduce): real reduce_std.h offloads (fold, value-returning)"
        run: |
          # The REAL pSTL-Bench reduce_std.h (generic wrapper -> std::reduce(par,b,e,elem_t{}))
          # via transparent routing -> the device_reduce funnel (fixed tree-reduction kernel,
