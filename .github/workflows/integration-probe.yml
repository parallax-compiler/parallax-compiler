            || { echo "::error::double partition produced a wrong result"; exit 1; }
          echo "PASS: std::partition(par) over double elements offloaded"

      - name: "GATE (unique double): 64-bit unique flags"
        run: |
          # Exercises generate_unique_flags_kernel for F64 (1.0/0.0 as doubles).
          # [0,0,1,1,...,499,499] -> unique [0..499], kept 500.
          cat > probe_und.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <iterator>
          #include <cstdio>
          int main() {
              const int N = 1000;
              std::vector<double> v(N);
              for (int i = 0; i < N; ++i) v[i] = (double)(i / 2);
              auto e = std::unique(std::execution::par, v.begin(), v.end());
              size_t kept = (size_t)std::distance(v.begin(), e);
              std::printf("und kept=%zu v[0]=%.1f v[499]=%.1f\n", kept, v[0], v[499]);
