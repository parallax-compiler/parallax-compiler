name: Integration Probe

# Empirically establishes the TRUE state of the end-to-end GPU-offload pipeline.
# The Parallax plugin is a ReplaceAction that rewrites source IN PLACE (allocator
# injection + replacing std::execution::par calls with runtime dispatch + embedded
# SPIR-V), so it is driven with `-Xclang -plugin -Xclang parallax`, NOT `-fplugin`.
#
# Every offload step is non-gating (continue-on-error) — this job is a diagnostic
# that always completes so we can read exactly where the pipeline stands. It is the
# capstone integration check: plugin load -> detection -> rewrite -> SPIR-V ->
# compile -> dispatch on software Vulkan (lavapipe) -> correctness vs CPU.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      CLANGXX: /usr/lib/llvm-21/bin/clang++
      # Let the Vulkan loader auto-discover the lavapipe ICD that mesa installs in
      # /usr/share/vulkan/icd.d/. Forcing VK_ICD_FILENAMES to a guessed path left
      # the loader with zero ICDs (VK_ERROR_INCOMPATIBLE_DRIVER, -9).
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - name: Checkout compiler
        uses: actions/checkout@v4
        with: { path: parallax-compiler }

      - name: Checkout runtime (sibling)
        uses: actions/checkout@v4
        with:
          repository: parallax-compiler/parallax-runtime
          ref: main
          path: parallax-runtime

      - name: Install LLVM/Clang 21, Vulkan + lavapipe, spirv-tools
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libvulkan-dev vulkan-tools mesa-vulkan-drivers \
            vulkan-validationlayers spirv-tools

      - name: Show Vulkan ICDs + devices (lavapipe)
        run: |
          echo "== ICD manifests =="; ls -la /usr/share/vulkan/icd.d/ || true
          echo "== vulkaninfo =="; vulkaninfo --summary 2>&1 | head -40 || echo "vulkaninfo failed"

      - name: Build runtime
        run: |
          cmake -S parallax-runtime -B parallax-runtime/out -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DPARALLAX_BUILD_TESTS=OFF
          cmake --build parallax-runtime/out -j

      - name: Build plugin
        run: |
          cmake -S parallax-compiler -B parallax-compiler/out -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang
          cmake --build parallax-compiler/out -j
          echo "PLUGIN=$PWD/parallax-compiler/out/src/plugin/libparallax-clang-plugin.so" >> "$GITHUB_ENV"

      - name: "PROBE (vulkan-caps): VK_EXT_external_memory_host + import smoke (Phase 0)"
        continue-on-error: true
        run: |
          # Phase 0 spike for the whole-heap memory model: can lavapipe import an mmap'd
          # anonymous host pool as a VkBuffer (VK_EXT_external_memory_host) with a BDA, and
          # does the device observe host writes made AFTER the import (ongoing coherence)?
          # Also records the limits the design consults (alignment, maxStorageBufferRange).
          cat > caps.cpp <<'EOF'
          #include <vulkan/vulkan.h>
          #include <sys/mman.h>
          #include <cstdio>
          #include <cstring>
          #include <cstdint>
          #include <vector>
          int main() {
              VkApplicationInfo app{VK_STRUCTURE_TYPE_APPLICATION_INFO};
              app.apiVersion = VK_API_VERSION_1_2;
              VkInstanceCreateInfo ici{VK_STRUCTURE_TYPE_INSTANCE_CREATE_INFO};
              ici.pApplicationInfo = &app;
              VkInstance inst;
              if (vkCreateInstance(&ici, nullptr, &inst) != VK_SUCCESS) { printf("EXT_MEM_HOST=err-no-instance\n"); return 1; }
              uint32_t n = 0; vkEnumeratePhysicalDevices(inst, &n, nullptr);
              if (!n) { printf("EXT_MEM_HOST=err-no-device\n"); return 1; }
              std::vector<VkPhysicalDevice> pds(n); vkEnumeratePhysicalDevices(inst, &n, pds.data());
              VkPhysicalDevice pd = pds[0];
              VkPhysicalDeviceProperties props; vkGetPhysicalDeviceProperties(pd, &props);
              printf("DEVICE=%s\n", props.deviceName);
              printf("MAXSSBO=%u MAXALLOC=%u\n", props.limits.maxStorageBufferRange, props.limits.maxMemoryAllocationCount);
              uint32_t ec = 0; vkEnumerateDeviceExtensionProperties(pd, nullptr, &ec, nullptr);
              std::vector<VkExtensionProperties> exts(ec);
              vkEnumerateDeviceExtensionProperties(pd, nullptr, &ec, exts.data());
              bool has_ext = false;
              for (auto& e : exts) if (!strcmp(e.extensionName, "VK_EXT_external_memory_host")) has_ext = true;
              VkPhysicalDeviceExternalMemoryHostPropertiesEXT emh{VK_STRUCTURE_TYPE_PHYSICAL_DEVICE_EXTERNAL_MEMORY_HOST_PROPERTIES_EXT};
              VkPhysicalDeviceProperties2 p2{VK_STRUCTURE_TYPE_PHYSICAL_DEVICE_PROPERTIES_2};
              p2.pNext = &emh;
              vkGetPhysicalDeviceProperties2(pd, &p2);
              printf("EXT_MEM_HOST=%s ALIGN=%llu\n", has_ext ? "yes" : "no",
                     (unsigned long long)emh.minImportedHostPointerAlignment);
              if (!has_ext) return 2;

              VkPhysicalDeviceBufferDeviceAddressFeatures bdaq{VK_STRUCTURE_TYPE_PHYSICAL_DEVICE_BUFFER_DEVICE_ADDRESS_FEATURES};
              VkPhysicalDeviceFeatures2 f2{VK_STRUCTURE_TYPE_PHYSICAL_DEVICE_FEATURES_2};
              f2.pNext = &bdaq;
              vkGetPhysicalDeviceFeatures2(pd, &f2);
              bool bda = bdaq.bufferDeviceAddress == VK_TRUE;
              printf("BDA_FEATURE=%s\n", bda ? "yes" : "no");

              uint32_t qfc = 0; vkGetPhysicalDeviceQueueFamilyProperties(pd, &qfc, nullptr);
              std::vector<VkQueueFamilyProperties> qf(qfc);
              vkGetPhysicalDeviceQueueFamilyProperties(pd, &qfc, qf.data());
              uint32_t qi = 0;
              for (uint32_t i = 0; i < qfc; ++i) if (qf[i].queueFlags & VK_QUEUE_COMPUTE_BIT) { qi = i; break; }
              float prio = 1.0f;
              VkDeviceQueueCreateInfo qci{VK_STRUCTURE_TYPE_DEVICE_QUEUE_CREATE_INFO};
              qci.queueFamilyIndex = qi; qci.queueCount = 1; qci.pQueuePriorities = &prio;
              const char* dexts[] = {"VK_EXT_external_memory_host"};
              VkPhysicalDeviceBufferDeviceAddressFeatures bdaf{VK_STRUCTURE_TYPE_PHYSICAL_DEVICE_BUFFER_DEVICE_ADDRESS_FEATURES};
              bdaf.bufferDeviceAddress = VK_TRUE;
              VkDeviceCreateInfo dci{VK_STRUCTURE_TYPE_DEVICE_CREATE_INFO};
              if (bda) dci.pNext = &bdaf;
              dci.queueCreateInfoCount = 1; dci.pQueueCreateInfos = &qci;
              dci.enabledExtensionCount = 1; dci.ppEnabledExtensionNames = dexts;
              VkDevice dev;
              if (vkCreateDevice(pd, &dci, nullptr, &dev) != VK_SUCCESS) { printf("IMPORT=err-no-logical-device\n"); return 3; }

              const size_t POOL = 64ull << 20;  // 64 MiB, multiple of any sane alignment
              void* pool = mmap(nullptr, POOL, PROT_READ | PROT_WRITE,
                                MAP_PRIVATE | MAP_ANONYMOUS | MAP_NORESERVE, -1, 0);
              if (pool == MAP_FAILED) { printf("IMPORT=err-mmap\n"); return 3; }
              ((uint32_t*)pool)[0] = 0xC0FFEE01u;                              // pre-import write
              *(uint32_t*)((char*)pool + POOL - 4096) = 0xC0FFEE02u;           // touch last page

              auto pHostProps = (PFN_vkGetMemoryHostPointerPropertiesEXT)
                  vkGetDeviceProcAddr(dev, "vkGetMemoryHostPointerPropertiesEXT");
              VkMemoryHostPointerPropertiesEXT hpp{VK_STRUCTURE_TYPE_MEMORY_HOST_POINTER_PROPERTIES_EXT};
              VkResult hr = pHostProps(dev, VK_EXTERNAL_MEMORY_HANDLE_TYPE_HOST_ALLOCATION_BIT_EXT, pool, &hpp);
              printf("HOSTPTR_PROPS=%d memoryTypeBits=0x%x\n", (int)hr, hpp.memoryTypeBits);
              if (hr != VK_SUCCESS) { printf("IMPORT=err-hostptr-props\n"); return 3; }

              VkExternalMemoryBufferCreateInfo embi{VK_STRUCTURE_TYPE_EXTERNAL_MEMORY_BUFFER_CREATE_INFO};
              embi.handleTypes = VK_EXTERNAL_MEMORY_HANDLE_TYPE_HOST_ALLOCATION_BIT_EXT;
              VkBufferCreateInfo bci{VK_STRUCTURE_TYPE_BUFFER_CREATE_INFO};
              bci.pNext = &embi;
              bci.size = POOL;
              bci.usage = VK_BUFFER_USAGE_STORAGE_BUFFER_BIT | VK_BUFFER_USAGE_TRANSFER_SRC_BIT |
                          (bda ? VK_BUFFER_USAGE_SHADER_DEVICE_ADDRESS_BIT : 0);
              bci.sharingMode = VK_SHARING_MODE_EXCLUSIVE;
              VkBuffer buf;
              if (vkCreateBuffer(dev, &bci, nullptr, &buf) != VK_SUCCESS) { printf("IMPORT=err-buffer\n"); return 3; }
              VkMemoryRequirements mr; vkGetBufferMemoryRequirements(dev, buf, &mr);
              uint32_t bits = mr.memoryTypeBits & hpp.memoryTypeBits;
              if (!bits) { printf("IMPORT=err-no-compatible-memtype\n"); return 3; }
              uint32_t idx = 0; while (!(bits & (1u << idx))) ++idx;
              VkImportMemoryHostPointerInfoEXT imp{VK_STRUCTURE_TYPE_IMPORT_MEMORY_HOST_POINTER_INFO_EXT};
              imp.handleType = VK_EXTERNAL_MEMORY_HANDLE_TYPE_HOST_ALLOCATION_BIT_EXT;
              imp.pHostPointer = pool;
              VkMemoryAllocateFlagsInfo mafi{VK_STRUCTURE_TYPE_MEMORY_ALLOCATE_FLAGS_INFO};
              mafi.pNext = &imp;
              mafi.flags = VK_MEMORY_ALLOCATE_DEVICE_ADDRESS_BIT;
              VkMemoryAllocateInfo mai{VK_STRUCTURE_TYPE_MEMORY_ALLOCATE_INFO};
              mai.pNext = bda ? (void*)&mafi : (void*)&imp;
              mai.allocationSize = POOL;
              mai.memoryTypeIndex = idx;
              VkDeviceMemory mem;
              VkResult ar = vkAllocateMemory(dev, &mai, nullptr, &mem);
              printf("IMPORT=%s (vr=%d)\n", ar == VK_SUCCESS ? "ok" : "FAIL", (int)ar);
              if (ar != VK_SUCCESS) return 3;
              vkBindBufferMemory(dev, buf, mem, 0);
              if (bda) {
                  VkBufferDeviceAddressInfo bai{VK_STRUCTURE_TYPE_BUFFER_DEVICE_ADDRESS_INFO};
                  bai.buffer = buf;
                  VkDeviceAddress addr = vkGetBufferDeviceAddress(dev, &bai);
                  printf("BDA=0x%llx\n", (unsigned long long)addr);
              }

              // Post-import host write, then device-side copy-out: proves the device sees
              // host stores made AFTER the import (the coherence the whole design rests on).
              *(uint32_t*)((char*)pool + 4096) = 0xC0FFEE03u;
              VkBufferCreateInfo rbci{VK_STRUCTURE_TYPE_BUFFER_CREATE_INFO};
              rbci.size = 8192; rbci.usage = VK_BUFFER_USAGE_TRANSFER_DST_BIT;
              rbci.sharingMode = VK_SHARING_MODE_EXCLUSIVE;
              VkBuffer rb; vkCreateBuffer(dev, &rbci, nullptr, &rb);
              VkMemoryRequirements rmr; vkGetBufferMemoryRequirements(dev, rb, &rmr);
              VkPhysicalDeviceMemoryProperties mp; vkGetPhysicalDeviceMemoryProperties(pd, &mp);
              uint32_t ridx = UINT32_MAX;
              for (uint32_t i = 0; i < mp.memoryTypeCount; ++i)
                  if ((rmr.memoryTypeBits & (1u << i)) &&
                      (mp.memoryTypes[i].propertyFlags & VK_MEMORY_PROPERTY_HOST_VISIBLE_BIT) &&
                      (mp.memoryTypes[i].propertyFlags & VK_MEMORY_PROPERTY_HOST_COHERENT_BIT)) { ridx = i; break; }
              VkMemoryAllocateInfo rmai{VK_STRUCTURE_TYPE_MEMORY_ALLOCATE_INFO};
              rmai.allocationSize = rmr.size; rmai.memoryTypeIndex = ridx;
              VkDeviceMemory rmem; vkAllocateMemory(dev, &rmai, nullptr, &rmem);
              vkBindBufferMemory(dev, rb, rmem, 0);
              VkQueue q; vkGetDeviceQueue(dev, qi, 0, &q);
              VkCommandPoolCreateInfo cpci{VK_STRUCTURE_TYPE_COMMAND_POOL_CREATE_INFO};
              cpci.queueFamilyIndex = qi;
              VkCommandPool cp; vkCreateCommandPool(dev, &cpci, nullptr, &cp);
              VkCommandBufferAllocateInfo cbai{VK_STRUCTURE_TYPE_COMMAND_BUFFER_ALLOCATE_INFO};
              cbai.commandPool = cp; cbai.level = VK_COMMAND_BUFFER_LEVEL_PRIMARY; cbai.commandBufferCount = 1;
              VkCommandBuffer cb; vkAllocateCommandBuffers(dev, &cbai, &cb);
              VkCommandBufferBeginInfo cbi{VK_STRUCTURE_TYPE_COMMAND_BUFFER_BEGIN_INFO};
              vkBeginCommandBuffer(cb, &cbi);
              VkBufferCopy regions[2] = {{0, 0, 8}, {4096, 8, 8}};
              vkCmdCopyBuffer(cb, buf, rb, 2, regions);
              vkEndCommandBuffer(cb);
              VkSubmitInfo si{VK_STRUCTURE_TYPE_SUBMIT_INFO};
              si.commandBufferCount = 1; si.pCommandBuffers = &cb;
              vkQueueSubmit(q, 1, &si, VK_NULL_HANDLE);
              vkQueueWaitIdle(q);
              void* rp; vkMapMemory(dev, rmem, 0, 8192, 0, &rp);
              uint32_t v0 = ((uint32_t*)rp)[0];
              uint32_t v1 = ((uint32_t*)((char*)rp + 8))[0];
              printf("READBACK pre-import=0x%x post-import=0x%x\n", v0, v1);
              bool ok = (v0 == 0xC0FFEE01u) && (v1 == 0xC0FFEE03u);
              printf("SMOKE=%s\n", ok ? "PASS" : "FAIL");
              return ok ? 0 : 4;
          }
          EOF
          "$CLANGXX" -std=c++17 caps.cpp -lvulkan -o caps
          ./caps || echo "(probe exit=$? — informational for Phase 3 design selection)"

      - name: "PROBE (vfs-overlay): -ivfsoverlay serves shadow content through original paths (Phase 0)"
        continue-on-error: true
        run: |
          # Phase 1 spike: verify Clang's VFS overlay works with the EXACT plugin invocation
          # shape (force-include + -Xclang plugin). A shadow copy of a header changes a
          # #define; the overlaid compile must use the shadow value while the original file
          # on disk stays byte-identical.
          mkdir -p vfsprobe/shadow && cd vfsprobe
          cat > vfshdr.h <<'EOF'
          #pragma once
          #define PLX_ADD 1.0f
          EOF
          cat > vfsmain.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          #include "vfshdr.h"
          int main() {
              std::vector<float> v(16, 1.0f);
              std::for_each(std::execution::par, v.begin(), v.end(),
                            [](float& x) { x = x * 2.0f + PLX_ADD; });
              std::printf("vfs result=%.1f\n", v[0]);
              return 0;
          }
          EOF
          sed 's/PLX_ADD 1.0f/PLX_ADD 3.0f/' vfshdr.h > shadow/vfshdr.h
          HDR="$(realpath vfshdr.h)"; SHW="$(realpath shadow/vfshdr.h)"
          cat > overlay.yaml <<EOF
          {
            "version": 0,
            "use-external-names": true,
            "roots": [
              { "name": "$HDR", "type": "file", "external-contents": "$SHW" }
            ]
          }
          EOF
          BEFORE=$(sha256sum vfshdr.h | cut -d' ' -f1)
          # Plugin invocation shape (routing off — this tests the overlay mechanism only).
          cp vfsmain.cpp work_vfs.cpp
          "$CLANGXX" -std=c++20 -I ../parallax-runtime/include -include parallax/stdpar.hpp \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -ivfsoverlay overlay.yaml -c work_vfs.cpp -o /dev/null 2> vfs_plugin.log || true
          grep -q "Parallax Plugin V2 Loaded" vfs_plugin.log \
            || { echo "::error::plugin did not load under -ivfsoverlay"; exit 1; }
          # Final build through the overlay; binary must print the SHADOW value (1*2 + 3.0 = 5.0).
          "$CLANGXX" -std=c++20 -O2 -ivfsoverlay overlay.yaml vfsmain.cpp -o vfsprobe_bin
          out="$(./vfsprobe_bin)"
          echo "$out"
          echo "$out" | grep -q "vfs result=5.0" \
            || { echo "::error::overlay content not used (expected 5.0 = 1*2+shadow 3.0)"; exit 1; }
          AFTER=$(sha256sum vfshdr.h | cut -d' ' -f1)
          [ "$BEFORE" = "$AFTER" ] || { echo "::error::original header was modified"; exit 1; }
          echo "PASS: VFS overlay serves shadow content; original untouched; plugin loads under overlay"

      - name: Write probe program
        run: |
          cat > probe.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> d(16, 1.0f);
              std::for_each(std::execution::par, d.begin(), d.end(),
                            [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("result=%.1f (expected 3.0)\n", d[0]);
              return (d[0] == 3.0f) ? 0 : 1;
          }
          EOF

      - name: "Baseline: compile + run on CPU (no plugin)"
        run: |
          "$CLANGXX" -std=c++20 -O2 probe.cpp -o probe_cpu
          ./probe_cpu

      - name: "Stage 1: plugin load + detection + in-place rewrite"
        continue-on-error: true
        run: |
          cp probe.cpp probe_rw.cpp
          echo "===== running rewriter (loading $PLUGIN) ====="
          "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" \
            -Xclang -plugin -Xclang parallax \
            -c probe_rw.cpp -o /dev/null 2>&1 | tee rewrite.log || true
          echo "===== rewritten source (probe_rw.cpp) ====="
          if ! diff -q probe.cpp probe_rw.cpp >/dev/null; then
            echo "[PROBE] source WAS rewritten:"; cat probe_rw.cpp
          else
            echo "[PROBE] source was NOT modified by the plugin"
          fi

      - name: "Stage 2: compile rewritten source + link runtime"
        continue-on-error: true
        run: |
          "$CLANGXX" -std=c++20 -O2 probe_rw.cpp \
            -I parallax-runtime/include \
            -L parallax-runtime/out -lparallax-runtime \
            -o probe_gpu 2>&1 | tee compile.log
          echo "[PROBE] linked probe_gpu: $([ -x probe_gpu ] && echo yes || echo no)"

      - name: "Stage 3: run offloaded binary on software Vulkan (lavapipe)"
        continue-on-error: true
        run: |
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          ./probe_gpu; echo "[PROBE] exit=$?"

      - name: "Stage 4: validate any emitted SPIR-V"
        continue-on-error: true
        run: |
          shopt -s globstar nullglob
          found=0
          for f in **/*.spv; do found=1; echo "validating $f"; spirv-val "$f" || true; done
          [ "$found" = 0 ] && echo "[PROBE] no .spv files emitted to disk (SPIR-V may be embedded as a byte array)"
          true

      - name: "DIAG: dump + validate the float kernel SPIR-V"
        continue-on-error: true
        run: |
          cp probe.cpp probe_spv.cpp
          PARALLAX_DUMP_SPIRV="$PWD/kernel.spv" "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" \
            -Xclang -plugin -Xclang parallax \
            -c probe_spv.cpp -o /dev/null 2>/dev/null || true
          if [ -f kernel.spv ]; then
            echo "===== spirv-val ====="; spirv-val kernel.spv || true
            echo "===== spirv-dis ====="; spirv-dis kernel.spv 2>/dev/null | head -100 || true
          else
            echo "no kernel.spv produced"
          fi

      - name: "GATE (int64): end-to-end execution with correct element size"
        run: |
          cat > probe_i64.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<long long> d(64, (long long)1 << 40);
              std::for_each(std::execution::par, d.begin(), d.end(),
                            [](long long& x) { x += 1; });
              long long expected = ((long long)1 << 40) + 1;
              std::printf("i64 result=%lld expected=%lld\n", (long long)d[0], expected);
              return d[0] == expected ? 0 : 1;
          }
          EOF
          # Rewrite in place, then compile + link + run on lavapipe.
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" \
            -Xclang -plugin -Xclang parallax \
            -c probe_i64.cpp -o /dev/null 2> i64.log || true
          grep -q "emit_op 17 operands: 11" i64.log \
            || { echo "::error::Int64 capability not emitted"; exit 1; }
          "$CLANGXX" -std=c++20 -O2 probe_i64.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_i64 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_i64 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::int64 kernel not offloaded"; exit 1; }
          exp=$(( (1<<40) + 1 ))
          echo "$out" | grep -q "i64 result=$exp expected=$exp" \
            || { echo "::error::int64 produced wrong result (truncation/size bug)"; exit 1; }
          echo "PASS: int64 for_each executed correctly end-to-end on the GPU"

      - name: "GATE (double): end-to-end execution (Float64)"
        run: |
          cat > probe_f64.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<double> d(64, 1.0);
              std::for_each(std::execution::par, d.begin(), d.end(),
                            [](double& x) { x = x * 2.0 + 1.0; });
              std::printf("f64 result=%.1f expected=3.0\n", d[0]);
              return (d[0] == 3.0) ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_f64.cpp -o /dev/null 2> f64.log || true
          echo "--- double transform decision ---"
          grep -inE "for_each|Transforming call|Generated [0-9]+|Kernel element type|spirv.*empty|Float64|operands: 10|CodeGen|Located operator|Unsupported|::error" f64.log | head -30 || true
          echo "---------------------------------"
          "$CLANGXX" -std=c++20 -O2 probe_f64.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_f64 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_f64 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::double kernel not offloaded"; exit 1; }
          echo "$out" | grep -q "f64 result=3.0 expected=3.0" \
            || { echo "::error::double produced wrong result"; exit 1; }
          echo "PASS: double for_each executed correctly end-to-end on the GPU"

      - name: "GATE (zero-copy): arena-backed for_each binds without a copy"
        run: |
          cat > probe_zc.cpp <<'EOF'
          #include <algorithm>
          #include <execution>
          #include <cstddef>
          #include <cstdio>
          extern "C" void* parallax_arena_alloc(size_t size, size_t align);
          int main() {
              const int N = 64;
              // Allocate the data directly in the unified arena (what interposition
              // does transparently); use raw-pointer iterators for for_each.
              float* d = static_cast<float*>(parallax_arena_alloc(N * sizeof(float), 16));
              if (!d) { std::printf("SKIP: no arena\n"); return 0; }
              for (int i = 0; i < N; ++i) d[i] = 1.0f;
              std::for_each(std::execution::par, d, d + N,
                            [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("zc result=%.1f expected=3.0\n", d[0]);
              return d[0] == 3.0f ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_zc.cpp -o /dev/null 2>/dev/null || true
          "$CLANGXX" -std=c++20 -O2 probe_zc.cpp \
            -I parallax-runtime/include -L parallax-runtime/out \
            -lparallax-runtime -o probe_zc 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_zc 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "SKIP:" && { echo "skipped (no arena)"; exit 0; }
          echo "$out" | grep -q "Zero-copy arena bind" \
            || { echo "::error::data was NOT zero-copy arena-bound"; exit 1; }
          echo "$out" | grep -q "zc result=3.0" \
            || { echo "::error::zero-copy kernel produced wrong result"; exit 1; }
          echo "PASS: arena for_each ran zero-copy (no memcpy) and is correct"

      - name: "GATE (pointer-chasing): deref a host pointer stored in the data"
        run: |
          # The marquee software-unified-memory unlock: the data buffer stores
          # raw host pointers (float*), and the lambda dereferences one. On the
          # GPU each stored pointer is relocated gpu=dev_base+(p-host_base) and
          # accessed via PhysicalStorageBuffer. ptrs[] and targets[] both live in
          # the single arena so one (host_base,dev_base) pair relocates them all.
          cat > probe_pc.cpp <<'EOF'
          #include <algorithm>
          #include <execution>
          #include <cstddef>
          #include <cstdio>
          extern "C" void* parallax_arena_alloc(size_t size, size_t align);
          int main() {
              const int N = 64;
              float*  targets = static_cast<float*>(parallax_arena_alloc(N * sizeof(float), 16));
              float** ptrs    = static_cast<float**>(parallax_arena_alloc(N * sizeof(float*), 16));
              if (!targets || !ptrs) { std::printf("SKIP: no arena\n"); return 0; }
              for (int i = 0; i < N; ++i) { targets[i] = 1.0f; ptrs[i] = &targets[i]; }
              // for_each over the pointer array; each element is a float* we deref.
              std::for_each(std::execution::par, ptrs, ptrs + N,
                            [](float*& p) { *p = *p * 2.0f + 1.0f; });
              std::printf("pc result=%.1f expected=3.0\n", targets[0]);
              return targets[0] == 3.0f ? 0 : 1;
          }
          EOF
          # Dump + validate the emitted SPIR-V and confirm the relocation opcodes.
          PARALLAX_DUMP_SPIRV="$PWD/pc.spv" "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_pc.cpp -o /dev/null 2> pc.log || true
          if [ -f pc.spv ]; then
            echo "===== spirv-val ====="; spirv-val pc.spv \
              || { echo "::error::pointer-chasing SPIR-V failed validation"; exit 1; }
            echo "===== spirv-dis (relocation) ====="
            spirv-dis pc.spv 2>/dev/null | grep -iE "OpConvertUToPtr|PhysicalStorageBuffer|OpISub|OpIAdd" | head -20 || true
            spirv-dis pc.spv 2>/dev/null | grep -q "OpConvertUToPtr" \
              || { echo "::error::no OpConvertUToPtr — pointer relocation not emitted"; exit 1; }
          else
            echo "::error::no pc.spv produced (kernel not generated)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_pc.cpp \
            -I parallax-runtime/include -L parallax-runtime/out \
            -lparallax-runtime -o probe_pc 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_pc 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "SKIP:" && { echo "skipped (no arena)"; exit 0; }
          echo "$out" | grep -q "pc result=3.0" \
            || { echo "::error::pointer-chasing produced wrong result (relocation/deref bug)"; exit 1; }
          echo "PASS: GPU dereferenced a host pointer stored in unified memory (pointer-chasing)"

      - name: "GATE (reduce): std::reduce(par) offloads a workgroup reduction"
        run: |
          # First Phase 3 primitive end-to-end from user code: the plugin detects
          # std::reduce, emits a workgroup tree-reduction kernel (shared memory +
          # OpControlBarrier, fully unrolled), and replaces the call with a value-
          # yielding statement-expression that runs the iterative GPU reduction.
          cat > probe_reduce.cpp <<'EOF'
          #include <vector>
          #include <numeric>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(4096);
              for (size_t i = 0; i < v.size(); ++i) v[i] = static_cast<float>(i % 8);
              // 4096/8 cycles * (0+..+7) = 512 * 28 = 14336, exact in float.
              float s = std::reduce(std::execution::par, v.begin(), v.end(), 0.0f);
              std::printf("reduce result=%.1f expected=14336.0\n", s);
              return (s == 14336.0f) ? 0 : 1;
          }
          EOF
          # Rewrite in place + dump the emitted reduce kernel; validate it.
          PARALLAX_DUMP_SPIRV="$PWD/red.spv" "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_reduce.cpp -o /dev/null 2> reduce.log || true
          if [ -f red.spv ]; then
            echo "===== spirv-val ====="; spirv-val red.spv \
              || { echo "::error::reduce SPIR-V failed validation"; exit 1; }
            echo "===== reduce kernel (barrier/shared-mem) ====="
            spirv-dis red.spv 2>/dev/null | grep -iE "OpControlBarrier|Workgroup|OpExecutionMode|OpTypeRuntimeArray" | head -12 || true
            spirv-dis red.spv 2>/dev/null | grep -q "OpControlBarrier" \
              || { echo "::error::no OpControlBarrier — reduction not emitted"; exit 1; }
          else
            echo "::error::no reduce SPIR-V produced (std::reduce not detected/generated)"; exit 1
          fi
          # Compile the rewritten source + link runtime, then run on lavapipe.
          "$CLANGXX" -std=c++20 -O2 probe_reduce.cpp \
            -I parallax-runtime/include -L parallax-runtime/out \
            -lparallax-runtime -o probe_reduce 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_reduce 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::reduce kernel was not offloaded"; exit 1; }
          echo "$out" | grep -q "reduce result=14336.0" \
            || { echo "::error::reduce produced wrong result"; exit 1; }
          echo "PASS: std::reduce(par) offloaded a GPU workgroup reduction (result=14336)"

      - name: "GATE (reduce+op): std::reduce with a user binary op (keystone)"
        run: |
          # The keystone: the reduction skeleton CALLS the user's compiled binary op
          # (OpFunctionCall) instead of a baked-in '+'. Product over 300 ones = 1.0,
          # which is distinct from the sum (300) — so a wrong (baked-in +) path is
          # caught. Exercises the guarded reduction (partial last block, 2 levels).
          cat > probe_reduceop.cpp <<'EOF'
          #include <vector>
          #include <numeric>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(300, 1.0f);
              float p = std::reduce(std::execution::par, v.begin(), v.end(), 1.0f,
                                    [](float a, float b){ return a * b; });
              std::printf("reduceop result=%.1f expected=1.0\n", p);
              return (p == 1.0f) ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/redop.spv" "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_reduceop.cpp -o /dev/null 2> reduceop.log || true
          if [ -f redop.spv ]; then
            echo "===== spirv-val ====="; spirv-val redop.spv \
              || { echo "::error::reduce+op SPIR-V failed validation"; exit 1; }
            echo "===== op call + functions ====="
            spirv-dis redop.spv 2>/dev/null | grep -iE "OpFunctionCall|OpFMul|OpFunction " | head -12 || true
            spirv-dis redop.spv 2>/dev/null | grep -q "OpFunctionCall" \
              || { echo "::error::no OpFunctionCall — user op not called by the skeleton"; exit 1; }
          else
            echo "::error::no reduce+op SPIR-V produced"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_reduceop.cpp \
            -I parallax-runtime/include -L parallax-runtime/out \
            -lparallax-runtime -o probe_reduceop 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_reduceop 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::reduce+op kernel not offloaded"; exit 1; }
          echo "$out" | grep -q "reduceop result=1.0" \
            || { echo "::error::reduce+op wrong result (user op not applied / identity bug)"; exit 1; }
          echo "PASS: std::reduce with a user binary op offloaded (skeleton calls compiled op)"

      - name: "GATE (transform): elementwise map in@0 -> out@1"
        run: |
          # std::transform with a by-value unary lambda: the kernel synthesizes the
          # in/out data buffers (binding 0/1), loads in[gid], calls the lambda with
          # the value, and stores the result to out[gid].
          cat > probe_xf.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> in(64, 3.0f), out(64, 0.0f);
              std::transform(std::execution::par, in.begin(), in.end(), out.begin(),
                             [](float x){ return x * x + 1.0f; });
              std::printf("xform result=%.1f expected=10.0\n", out[0]);
              return (out[0] == 10.0f) ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_xf.cpp -o /dev/null 2>/dev/null || true
          "$CLANGXX" -std=c++20 -O2 probe_xf.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_xf 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_xf 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "xform result=10.0" \
            || { echo "::error::std::transform produced wrong result"; exit 1; }
          echo "PASS: std::transform offloaded (synthesized in/out buffers)"

      - name: "GATE (transform capture): a CAPTURING transform op binds captures@2"
        run: |
          # std::transform with a by-value CAPTURING op [k,c](x){return x*k+c;}. The kernel
          # synthesizes in@0/out@1 and reads k,c from the uniform@2 captures block (bound by
          # launch_transform's captures path). Must OFFLOAD (host fallback would mask a broken
          # capture bind), so assert "Successfully loaded kernel". in=1, k=3, c=2 -> out=5.
          cat > probe_xfc.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> in(64, 1.0f), out(64, 0.0f);
              float k = 3.0f, c = 2.0f;
              std::transform(std::execution::par, in.begin(), in.end(), out.begin(),
                             [k,c](float x){ return x * k + c; });
              std::printf("xfc result=%.1f expected=5.0\n", out[0]);
              return (out[0] == 5.0f) ? 0 : 1;
          }
          EOF
          cp probe_xfc.cpp work_xfc.cpp
          FLAGS="-std=c++20 -I parallax-runtime/include -include parallax/stdpar.hpp \
            -Xclang -load -Xclang $PLUGIN -Xclang -plugin -Xclang parallax"
          PARALLAX_TRANSPARENT=1 "$CLANGXX" $FLAGS -c work_xfc.cpp -o /dev/null 2> xfc1.log || true
          echo "routed refs: $(grep -c 'parallax::transform' work_xfc.cpp)"
          grep -q 'parallax::transform' work_xfc.cpp \
            || { echo '::error::transparent routing did NOT rewrite std::transform'; exit 1; }
          PARALLAX_DUMP_SPIRV="$PWD/xfc.spv" PARALLAX_TRANSPARENT=1 "$CLANGXX" $FLAGS \
            -c work_xfc.cpp -o /dev/null 2> xfc2.log || true
          echo "registrars: $(grep -c 'parallax_kernel_register' work_xfc.cpp)"
          grep -aE 'scalar captures' xfc2.log | head -1
          [ -f xfc.spv ] && { spirv-val xfc.spv || { echo "::error::capturing transform SPIR-V invalid"; exit 1; }; }
          "$CLANGXX" -std=c++20 -O2 -include parallax/stdpar.hpp work_xfc.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -o probe_xfc 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./probe_xfc 2>&1)" || true
          echo "$out" | grep -aE "xfc result=|Successfully loaded kernel|MISS" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::capturing transform was not offloaded"; exit 1; }
          echo "$out" | grep -q "xfc result=5.0" \
            || { echo "::error::capturing transform wrong result (capture bind broken?)"; exit 1; }
          echo "PASS: a capturing std::transform op offloaded with its captures bound"

      - name: "GATE (transform_reduce): map then reduce on the GPU"
        run: |
          # transform_reduce = transform(top) into scratch, then reduce(rop). Sum of
          # squares of 256 twos = 256*4 = 1024 (a plain sum would be 512), so the
          # transform must actually run. Composes the existing transform + reduce
          # kernels with no new runtime work.
          cat > probe_tr.cpp <<'EOF'
          #include <vector>
          #include <numeric>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(256, 2.0f);
              float r = std::transform_reduce(std::execution::par, v.begin(), v.end(), 0.0f,
                                              [](float a, float b){ return a + b; },
                                              [](float x){ return x * x; });
              std::printf("tr result=%.1f expected=1024.0\n", r);
              return (r == 1024.0f) ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_tr.cpp -o /dev/null 2> tr.log || true
          grep -n "transform_reduce: generated" tr.log || true
          "$CLANGXX" -std=c++20 -O2 probe_tr.cpp \
            -I parallax-runtime/include -L parallax-runtime/out \
            -lparallax-runtime -o probe_tr 2>&1 | tail -5
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_tr 2>&1)" || true
          echo "$out" | grep -v "^\[" | head -20
          echo "$out" | grep -q "tr result=1024.0" \
            || { echo "::error::transform_reduce wrong result (transform or reduce failed)"; exit 1; }
          echo "PASS: std::transform_reduce offloaded (map then reduce composed on GPU)"

      - name: "GATE (transform_reduce T!=U): float elements -> int accumulator"
        run: |
          # Type-changing transform_reduce: map float -> int (FPToSI cast), reduce
          # in int. (int)2.5 = 2 over 256 elements -> 512. Exercises the T!=U output
          # buffer + the FP->int conversion op.
          cat > probe_tri.cpp <<'EOF'
          #include <vector>
          #include <numeric>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(256, 2.5f);
              int r = std::transform_reduce(std::execution::par, v.begin(), v.end(), 0,
                                            [](int a, int b){ return a + b; },
                                            [](float x){ return (int)x; });
              std::printf("tri result=%d expected=512\n", r);
              return (r == 512) ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/tri.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_tri.cpp -o /dev/null 2>/dev/null || true
          [ -f tri.spv ] && { spirv-val tri.spv || { echo "::error::transform_reduce T!=U SPIR-V invalid"; exit 1; }; }
          "$CLANGXX" -std=c++20 -O2 probe_tri.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_tri 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_tri 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "tri result=512" \
            || { echo "::error::transform_reduce float->int produced wrong result"; exit 1; }
          echo "PASS: type-changing transform_reduce (float->int) offloaded"

      - name: "GATE (transform_reduce widen): float elements -> double accumulator"
        run: |
          # Differing in/out element BYTE sizes (float 4 -> double 8): transform2
          # sizes the in/out buffers separately. 256 * 2.5 = 640.0, accumulated in
          # double. Exercises FPExt + the runtime out_elem_size path.
          cat > probe_trw.cpp <<'EOF'
          #include <vector>
          #include <numeric>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(256, 2.5f);
              double r = std::transform_reduce(std::execution::par, v.begin(), v.end(), 0.0,
                                               [](double a, double b){ return a + b; },
                                               [](float x){ return (double)x; });
              std::printf("trw result=%.1f expected=640.0\n", r);
              return (r == 640.0) ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/trw.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_trw.cpp -o /dev/null 2>/dev/null || true
          [ -f trw.spv ] && { spirv-val trw.spv || { echo "::error::widen SPIR-V invalid"; exit 1; }; }
          "$CLANGXX" -std=c++20 -O2 probe_trw.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_trw 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_trw 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "trw result=640.0" \
            || { echo "::error::float->double transform_reduce produced wrong result"; exit 1; }
          echo "PASS: widening transform_reduce (float->double) offloaded"

      - name: "GATE (count_if): predicate count on the GPU"
        run: |
          # count_if = (predicate -> 0/1 transform) then '+' reduce. v[i]=i over
          # [0,100); count x>49.5 -> elements 50..99 = 50. Exercises OpSelect (the
          # predicate->count conversion) and the orchestration's integer cast.
          cat > probe_ci.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(100);
              for (int i = 0; i < 100; ++i) v[i] = static_cast<float>(i);
              long c = std::count_if(std::execution::par, v.begin(), v.end(),
                                     [](float x){ return x > 49.5f; });
              std::printf("countif result=%ld expected=50\n", c);
              return (c == 50) ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/ci.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_ci.cpp -o /dev/null 2>/dev/null || true
          [ -f ci.spv ] && { spirv-val ci.spv || { echo "::error::count_if SPIR-V invalid"; exit 1; }; }
          "$CLANGXX" -std=c++20 -O2 probe_ci.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_ci 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_ci 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "countif result=50" \
            || { echo "::error::count_if produced wrong result"; exit 1; }
          echo "PASS: std::count_if offloaded (predicate -> count -> reduce)"

      - name: "GATE (any/all/none_of): predicate quantifiers on the GPU"
        run: |
          # any_of=count>0, all_of=count==n, none_of=count==0. All four quantifier
          # calls live in ONE binary (multiple reduce-family orchestrations per
          # program). v[i]=i over [0,100): a(any x>98.5)=1 b(all x>=0)=1
          # c(none x>200)=1 d(all x>50)=0.
          cat > probe_of.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(100);
              for (int i = 0; i < 100; ++i) v[i] = static_cast<float>(i);
              bool a = std::any_of (std::execution::par, v.begin(), v.end(), [](float x){ return x > 98.5f; });
              bool b = std::all_of (std::execution::par, v.begin(), v.end(), [](float x){ return x >= 0.0f; });
              bool c = std::none_of(std::execution::par, v.begin(), v.end(), [](float x){ return x > 200.0f; });
              bool d = std::all_of (std::execution::par, v.begin(), v.end(), [](float x){ return x > 50.0f; });
              std::printf("of a=%d b=%d c=%d d=%d expected=1 1 1 0\n", a, b, c, d);
              return (a && b && c && !d) ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_of.cpp -o /dev/null 2>/dev/null || true
          "$CLANGXX" -std=c++20 -O2 probe_of.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_of 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_of 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "of a=1 b=1 c=1 d=0" \
            || { echo "::error::any/all/none_of produced wrong result"; exit 1; }
          echo "PASS: std::any_of/all_of/none_of offloaded (4 calls, one binary)"

      - name: "GATE (multi-call): distinct reduce-family calls don't alias"
        run: |
          # Regression for the mangled-name aliasing bug: two count_if with DIFFERENT
          # predicates in one TU must give different counts (x>49.5->50, x>9.5->90).
          cat > probe_mc.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(100);
              for (int i = 0; i < 100; ++i) v[i] = static_cast<float>(i);
              long c1 = std::count_if(std::execution::par, v.begin(), v.end(), [](float x){ return x > 49.5f; });
              long c2 = std::count_if(std::execution::par, v.begin(), v.end(), [](float x){ return x > 9.5f;  });
              std::printf("mc c1=%ld c2=%ld expected=50 90\n", c1, c2);
              return (c1 == 50 && c2 == 90) ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_mc.cpp -o /dev/null 2>/dev/null || true
          "$CLANGXX" -std=c++20 -O2 probe_mc.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_mc 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
