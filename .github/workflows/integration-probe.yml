          # before and after, yet the built binary must still offload + be correct.
          mkdir -p shadowg && cd shadowg
          cat > kern.h <<'EOF'
          #pragma once
          #include <algorithm>
          #include <execution>
          template <class V>
          void scale(V& v) {
              std::for_each(std::execution::par, v.begin(), v.end(),
                            [](float& x) { x = x * 2.0f + 1.0f; });
