name: Integration Probe

# Empirically establishes the TRUE state of the end-to-end GPU-offload pipeline.
# The Parallax plugin is a ReplaceAction that rewrites source IN PLACE (allocator
# injection + replacing std::execution::par calls with runtime dispatch + embedded
# SPIR-V), so it is driven with `-Xclang -plugin -Xclang parallax`, NOT `-fplugin`.
#
# Every offload step is non-gating (continue-on-error) — this job is a diagnostic
# that always completes so we can read exactly where the pipeline stands. It is the
# capstone integration check: plugin load -> detection -> rewrite -> SPIR-V ->
# compile -> dispatch on software Vulkan (lavapipe) -> correctness vs CPU.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      CLANGXX: /usr/lib/llvm-21/bin/clang++
      # Let the Vulkan loader auto-discover the lavapipe ICD that mesa installs in
      # /usr/share/vulkan/icd.d/. Forcing VK_ICD_FILENAMES to a guessed path left
      # the loader with zero ICDs (VK_ERROR_INCOMPATIBLE_DRIVER, -9).
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - name: Checkout compiler
        uses: actions/checkout@v4
        with: { path: parallax-compiler }

      - name: Checkout runtime (sibling)
        uses: actions/checkout@v4
        with:
          repository: parallax-compiler/parallax-runtime
          ref: main
          path: parallax-runtime

      - name: Install LLVM/Clang 21, Vulkan + lavapipe, spirv-tools
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libvulkan-dev vulkan-tools mesa-vulkan-drivers \
            vulkan-validationlayers spirv-tools

      - name: Show Vulkan ICDs + devices (lavapipe)
        run: |
          echo "== ICD manifests =="; ls -la /usr/share/vulkan/icd.d/ || true
          echo "== vulkaninfo =="; vulkaninfo --summary 2>&1 | head -40 || echo "vulkaninfo failed"

      - name: Build runtime
        run: |
          cmake -S parallax-runtime -B parallax-runtime/out -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DPARALLAX_BUILD_TESTS=OFF
          cmake --build parallax-runtime/out -j

      - name: Build plugin
        run: |
          cmake -S parallax-compiler -B parallax-compiler/out -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang
          cmake --build parallax-compiler/out -j
          echo "PLUGIN=$PWD/parallax-compiler/out/src/plugin/libparallax-clang-plugin.so" >> "$GITHUB_ENV"

      - name: Write probe program
        run: |
          cat > probe.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> d(16, 1.0f);
              std::for_each(std::execution::par, d.begin(), d.end(),
                            [](float& x) { x = x * 2.0f + 1.0f; });
              std::printf("result=%.1f (expected 3.0)\n", d[0]);
              return (d[0] == 3.0f) ? 0 : 1;
          }
          EOF

      - name: "Baseline: compile + run on CPU (no plugin)"
        run: |
          "$CLANGXX" -std=c++20 -O2 probe.cpp -o probe_cpu
          ./probe_cpu

      - name: "Stage 1: plugin load + detection + in-place rewrite"
        continue-on-error: true
        run: |
          cp probe.cpp probe_rw.cpp
          echo "===== running rewriter (loading $PLUGIN) ====="
          "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" \
            -Xclang -plugin -Xclang parallax \
            -c probe_rw.cpp -o /dev/null 2>&1 | tee rewrite.log || true
          echo "===== rewritten source (probe_rw.cpp) ====="
          if ! diff -q probe.cpp probe_rw.cpp >/dev/null; then
            echo "[PROBE] source WAS rewritten:"; cat probe_rw.cpp
          else
            echo "[PROBE] source was NOT modified by the plugin"
          fi

      - name: "Stage 2: compile rewritten source + link runtime"
        continue-on-error: true
        run: |
          "$CLANGXX" -std=c++20 -O2 probe_rw.cpp \
            -I parallax-runtime/include \
            -L parallax-runtime/out -lparallax-runtime \
            -o probe_gpu 2>&1 | tee compile.log
          echo "[PROBE] linked probe_gpu: $([ -x probe_gpu ] && echo yes || echo no)"

      - name: "Stage 3: run offloaded binary on software Vulkan (lavapipe)"
        continue-on-error: true
        run: |
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          ./probe_gpu; echo "[PROBE] exit=$?"

      - name: "Stage 4: validate any emitted SPIR-V"
        continue-on-error: true
        run: |
          shopt -s globstar nullglob
          found=0
          for f in **/*.spv; do found=1; echo "validating $f"; spirv-val "$f" || true; done
          [ "$found" = 0 ] && echo "[PROBE] no .spv files emitted to disk (SPIR-V may be embedded as a byte array)"
          true

      - name: "DIAG: dump + validate the float kernel SPIR-V"
        continue-on-error: true
        run: |
          cp probe.cpp probe_spv.cpp
          PARALLAX_DUMP_SPIRV="$PWD/kernel.spv" "$CLANGXX" -std=c++20 \
            -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" \
            -Xclang -plugin -Xclang parallax \
            -c probe_spv.cpp -o /dev/null 2>/dev/null || true
          if [ -f kernel.spv ]; then
            echo "===== spirv-val ====="; spirv-val kernel.spv || true
            echo "===== spirv-dis ====="; spirv-dis kernel.spv 2>/dev/null | head -100 || true
          else
            echo "no kernel.spv produced"
          fi

      - name: "PROBE (Phase 1c): int64 emits real Int64, no truncation"
        # Informational: end-to-end int64 transform also needs non-float element
        # support in the rewriter + runtime (Phase 4). This checks the truncation
        # fix itself once an int64 kernel reaches SPIR-V generation.
        continue-on-error: true
        run: |
          cat > probe_i64.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdint>
          int main() {
              std::vector<long long> d(8, (long long)1 << 40);
              std::for_each(std::execution::par, d.begin(), d.end(),
                            [](long long& x) { x += 1; });
              return 0;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" \
            -Xclang -plugin -Xclang parallax \
            -c probe_i64.cpp -o /dev/null 2> i64.log || true
          echo "--- int64 transform decision (key lines from i64.log) ---"
          grep -inE "for_each|Transforming call|Generated [0-9]+|Skipping|unsupported|Kernel element type|spirv.*empty|will run on CPU|CodeGen|class reference|emit_op 17 operands: 11|OpTypeInt" i64.log | head -40 || true
          echo "----------------------------------------------------------"
          # SPIRVBuilder logs every op: OpCapability(17) with operand 11 == Int64.
          grep -q "emit_op 17 operands: 11" i64.log \
            || { echo "::error::Int64 capability not emitted for an int64 kernel"; exit 1; }
          if grep -qiE "Mapping .*64-bit.* to 32-bit|Mapping Int64 type to Int32" i64.log; then
            echo "::error::int64 is still being truncated to 32-bit"; exit 1
          fi
          echo "PASS: int64 kernel emits real Int64 capability with no truncation"

      - name: "GATE: assert end-to-end GPU offload correctness"
        run: |
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_gpu 2>&1)" || true
          echo "$out"
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::no GPU offload — kernel was not loaded"; exit 1; }
          echo "$out" | grep -q "result=3.0" \
            || { echo "::error::GPU produced wrong result"; exit 1; }
          echo "PASS: GPU offload produced the correct result via compiler-emitted SPIR-V"
