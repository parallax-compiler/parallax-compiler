          PARALLAX_TRANSPARENT=1 "$CLANGXX" -std=c++20 $INC $PLG -c rdw.cpp -o /dev/null 2>r2.log || true
          echo "registrars: $(grep -c 'parallax_kernel_register' rdw.cpp)"; grep -aE 'ParallaxFunnel|SPIR-V words' r2.log | head
          "$CLANGXX" -std=c++20 -O2 $INC rdw.cpp -L parallax-runtime/out -lparallax-runtime -o rdbin 2>&1 | tail -3
          o="$(PARALLAX_DEBUG=1 ./rdbin 2>&1)" || true
