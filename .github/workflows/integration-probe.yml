          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::copy_if kernels were not offloaded"; exit 1; }
          echo "$out" | grep -q "copy_if kept=999 out\[0\]=1.0 out\[998\]=999.0" \
            || { echo "::error::copy_if produced a wrong result"; exit 1; }
          echo "PASS: std::copy_if(par) offloaded GPU stream compaction (flags+scan+scatter)"

      - name: "GATE (remove_if): in-place compaction on the GPU"
        run: |
