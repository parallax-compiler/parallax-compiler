          # not on pattern-matching the call site inside a generic wrapper (which was
          # non-deterministic). It registers per-instantiation SPIR-V keyed by the
          # instantiation's __PRETTY_FUNCTION__, which the runtime funnel recomputes.
          write_probe() {
            cat > probe_funnel.cpp <<'EOF'
          #include <vector>
          #include <cstdio>
          #include <cstddef>
          #include <parallax/stdpar.hpp>
          // pSTL-Bench shape: policy + container + functor are all generic template params.
          const auto for_each_par = [](auto&& policy, auto& input, auto&& f) {
              parallax::for_each(policy, input.begin(), input.end(), f);
          };
          int main() {
              std::vector<float> v(64, 1.0f);
              auto myf = [](auto& elem) { elem = elem * 2.0f + 1.0f; };  // generic, captureless
              for_each_par(parallax::par, v, myf);
              std::printf("funnel result=%.1f expected=3.0\n", v[0]);
              return v[0] == 3.0f ? 0 : 1;
          }
          EOF
          }
          # DETERMINISM: run the plugin compile 3x on a FRESH source each time; the
          # per-instantiation registrar must be emitted EVERY time.
          for run in 1 2 3; do
            write_probe
            "$CLANGXX" -std=c++20 -I parallax-runtime/include \
              -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
              -c probe_funnel.cpp -o /dev/null 2> fun_$run.log; pc=$?
            regs=$(grep -c "parallax_kernel_register" probe_funnel.cpp || true)
            echo "run $run: plugin exit=$pc, registrars emitted=$regs"
            grep -aE "FUNNEL-DBG|ParallaxFunnel" fun_$run.log | head -12 || true
            if [ "$regs" -lt 1 ]; then
              echo "::error::funnel registrar NOT emitted on run $run (interception is non-deterministic)"; exit 1
            fi
          done
          # Build the rewritten source + link WITHOUT -ltbb (the funnel host fallback
          # needs no par backend, so linking alone no longer proves offload -> we prove
          # it via the runtime kernel load below).
          "$CLANGXX" -std=c++20 -O2 probe_funnel.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -o probe_funnel 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./probe_funnel 2>&1)" || true
          echo "$out" | grep -aE "funnel result=|Successfully loaded kernel|kernel_lookup|kernel_register" | head -20
          # A registry key MISMATCH would silently fall back to the host loop (still 4.0),
          # so require the actual GPU kernel load as the offload proof.
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::funnel kernel not offloaded (register/lookup key mismatch?)"; exit 1; }
          echo "$out" | grep -q "funnel result=3.0" \
            || { echo "::error::funnel produced a wrong result"; exit 1; }
          echo "PASS(1/2): captureless generic par call offloaded DETERMINISTICALLY via the funnel"

          # Stage 2: the FULL pSTL-Bench shape — generic + CAPTURING (its) + looping functor.
          # Exercises capture binding through the funnel (closure bytes -> uniform).
          cat > probe_funnel_cap.cpp <<'EOF'
          #include <vector>
          #include <cstdio>
          #include <cstddef>
          #include <parallax/stdpar.hpp>
          const auto for_each_par = [](auto&& policy, auto& input, auto&& f) {
              parallax::for_each(policy, input.begin(), input.end(), f);
          };
          int main() {
              std::vector<float> v(64, 1.0f);
              std::size_t its = 3;                                        // NON-const: a real runtime capture (const would constant-fold)
              auto myf = [=](auto& elem) { for (std::size_t i = 0; i < its; ++i) elem += 1.0f; };
              for_each_par(parallax::par, v, myf);
              std::printf("funnel cap result=%.1f expected=4.0\n", v[0]);
              return v[0] == 4.0f ? 0 : 1;
          }
          EOF
          "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_funnel_cap.cpp -o /dev/null 2> funcap.log || true
          grep -aE "ParallaxFunnel|FUNNEL-DBG" funcap.log | head -6 || true
          "$CLANGXX" -std=c++20 -O2 probe_funnel_cap.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -o probe_funnel_cap 2>&1 | tail -3
          outc="$(PARALLAX_DEBUG=1 ./probe_funnel_cap 2>&1)" || true
          echo "$outc" | grep -aE "funnel cap result=|Successfully loaded kernel|MISS" | head
          echo "$outc" | grep -q "Successfully loaded kernel" \
            || { echo "::error::capturing funnel kernel not offloaded"; exit 1; }
          echo "$outc" | grep -q "funnel cap result=4.0" \
            || { echo "::error::capturing funnel produced a wrong result (capture binding)"; exit 1; }
          echo "PASS(2/2): capturing pSTL-Bench-shape generic par call offloaded correctly via the funnel"

      - name: "GATE (transparent): UNMODIFIED std::for_each(std::execution::par,...) offloads"
        run: |
          # nvc++-parity: source uses stock std::for_each(std::execution::par,...) with
          # NO parallax:: names. Transparent routing (PARALLAX_TRANSPARENT=1) rewrites the
          # callee to parallax::for_each; a second plugin pass funnels device_invoke. This
          # is what lets UNMODIFIED pSTL-Bench code offload.
          cat > probe_trans.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          #include <cstddef>
          // pSTL-Bench shape, verbatim std::for_each(std::execution::par,...):
          const auto for_each_std = [](auto&& policy, auto& input, auto&& f) {
              std::for_each(policy, input.begin(), input.end(), f);
          };
          int main() {
              std::vector<float> v(64, 1.0f);
              auto myf = [](auto& elem) { elem = elem * 2.0f + 1.0f; };
              for_each_std(std::execution::par, v, myf);
              std::printf("transparent result=%.1f expected=3.0\n", v[0]);
              return v[0] == 3.0f ? 0 : 1;
          }
          EOF
          cp probe_trans.cpp work_trans.cpp
          FLAGS="-std=c++20 -I parallax-runtime/include -include parallax/stdpar.hpp \
            -Xclang -load -Xclang $PLUGIN -Xclang -plugin -Xclang parallax"
          # Pass 1: route std::for_each -> parallax::for_each in the source.
          PARALLAX_TRANSPARENT=1 "$CLANGXX" $FLAGS -c work_trans.cpp -o /dev/null 2> tr1.log || true
          echo "routed refs: $(grep -c 'parallax::for_each' work_trans.cpp)"; grep -aE 'ParallaxRoute' tr1.log | head
          grep -q 'parallax::for_each' work_trans.cpp \
            || { echo '::error::transparent routing did NOT rewrite std::for_each'; exit 1; }
          # Pass 2: funnel device_invoke (now instantiated) -> appends registrar.
          PARALLAX_TRANSPARENT=1 "$CLANGXX" $FLAGS -c work_trans.cpp -o /dev/null 2> tr2.log || true
          echo "registrars: $(grep -c 'parallax_kernel_register' work_trans.cpp)"; grep -aE 'ParallaxFunnel' tr2.log | head
          grep -q 'parallax_kernel_register' work_trans.cpp \
            || { echo '::error::funnel did not register a kernel after routing'; exit 1; }
          # Build the routed+funneled source (no -ltbb) and run.
          "$CLANGXX" -std=c++20 -O2 -include parallax/stdpar.hpp work_trans.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -o probe_trans 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./probe_trans 2>&1)" || true
          echo "$out" | grep -aE "transparent result=|Successfully loaded kernel|MISS" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::transparent std::par did not offload"; exit 1; }
          echo "$out" | grep -q "transparent result=3.0" \
            || { echo "::error::transparent std::par produced a wrong result"; exit 1; }
          echo "PASS: UNMODIFIED std::for_each(std::execution::par,...) offloaded to the GPU"

      - name: "GATE (pSTL-Bench for_each): the REAL kernel offloads correctly (+ codegen isolation)"
        run: |
          # Compiles the REAL pSTL-Bench for_each_std.h kernel (nested generic lambda with a
          # volatile, a local accumulator, a loop, and a captured iteration count) via
          # transparent route -> funnel -> build -> run on lavapipe. Also runs isolation
          # variants. REQUIRES every variant (incl. the real kernel) to OFFLOAD + verify.
          fails=0
          git clone --depth 1 https://github.com/parlab-tuwien/pSTL-Bench /tmp/pstlb 2>&1 | tail -1
          INC="-I parallax-runtime/include -I /tmp/pstlb/include -include parallax/stdpar.hpp"
          PLG="-Xclang -load -Xclang $PLUGIN -Xclang -plugin -Xclang parallax"
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          run_variant() {
            name="$1"; header="$2"; body="$3"
            cat > v.cpp <<EOF
          #include <vector>
          #include <execution>
          #include <cstdio>
          #include <cstddef>
          $header
          using elem_t = float;
          const auto for_each_std = [](auto&& policy, auto& input, auto&& f){ std::for_each(policy, input.begin(), input.end(), f); };
          int main(){
            std::vector<elem_t> data(64, 0.0f);
            std::size_t its = 3;
            for_each_std(std::execution::par, data, [=](auto& elem){ $body });
            std::printf("[$name] result=%.1f expected=3.0\n", (double)data[0]);
            return data[0]==3.0f?0:1;
          }
          EOF
            PARALLAX_TRANSPARENT=1 "$CLANGXX" -std=c++20 $INC $PLG -c v.cpp -o /dev/null 2>/dev/null || true
            PARALLAX_TRANSPARENT=1 "$CLANGXX" -std=c++20 $INC $PLG -c v.cpp -o /dev/null 2> vf.log || true
            "$CLANGXX" -std=c++20 -O2 $INC v.cpp -L parallax-runtime/out -lparallax-runtime -o v 2>/dev/null || true
            o="$(PARALLAX_DEBUG=1 ./v 2>&1)" || true
            res="$(echo "$o" | grep -aoE "result=[0-9.]+" | head -1)"
            if echo "$o" | grep -q "Successfully loaded kernel"; then
              if echo "$o" | grep -q "result=3.0"; then echo "  $name: OFFLOAD ok  ($res)";
              else echo "  $name: MISCOMPILE (offloaded, wrong)  ($res)"; fails=$((fails+1)); fi
            else
              echo "  $name: cpu-fallback (not offloaded)  ($res)"; fails=$((fails+1))
            fi
          }
          echo "=== the REAL pSTL-Bench kernel + codegen isolation (all must OFFLOAD + verify) ==="
          run_variant "direct"      "" "elem = (elem_t)its;"
          run_variant "loop-direct" "" "for (std::size_t i=0;i<its;++i){ elem++; }"
          run_variant "loop-local"  "" "elem_t a{}; for (std::size_t i=0;i<its;++i){ a++; } elem = a;"
          run_variant "vol-loop"    "" "volatile std::size_t I=its; for (std::size_t i=0;i<I;++i){ elem++; }"
          run_variant "real-kernel" \
            '#include "pstl/benchmarks/for_each/for_each_std.h"
          static const auto kernel = [](auto& input, const auto Its){ volatile std::size_t I=Its; float a{}; for(std::size_t i=0;i<I;++i){a++;} input=a; };' \
            "kernel(elem, its);"
          [ "$fails" -eq 0 ] || { echo "::error::$fails pSTL-Bench for_each variant(s) did not offload+verify"; exit 1; }
          echo "PASS: the REAL pSTL-Bench for_each kernel (volatile+local+nested+capture) offloaded to the GPU + verified"

      - name: "GATE (pSTL-Bench transform): real transform_std.h offloads (2-buffer map)"
        run: |
          # The REAL pSTL-Bench transform_std.h wrapper (std::transform(par,in,out,f)) via
          # transparent routing -> the device_transform funnel (2 buffers, out[i]=f(in[i])).
          # Exact-comparable op here (the real kernel is sin/tan/min = precision-sensitive;
          # the interception+2-buffer mechanism is what we gate).
          git clone --depth 1 https://github.com/parlab-tuwien/pSTL-Bench /tmp/pstlb 2>/dev/null || true
          INC="-I parallax-runtime/include -I /tmp/pstlb/include -include parallax/stdpar.hpp"
          PLG="-Xclang -load -Xclang $PLUGIN -Xclang -plugin -Xclang parallax"
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          cat > tr.cpp <<'EOF'
