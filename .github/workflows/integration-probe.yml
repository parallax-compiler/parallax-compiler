      - name: "GATE (bitwise): integer &|^ << >> and % in a kernel"
        run: |
          # Hardening: integer bitwise, shift, and modulo ops must lower to real
          # SPIR-V (OpBitwise*/OpShift*/OpSRem), not silently produce invalid SPIR-V.
          # The reference array is computed by a plain CPU loop (not a parallel
          # algorithm, so not offloaded); the GPU result must match it exactly.
          cat > probe_bit.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              const int N = 256;
              std::vector<int> v(N), ref(N);
              for (int i = 0; i < N; ++i) {
                  int x = i * 7 + 1;
                  v[i] = x;
                  int y = x; y = (y << 1) ^ (y & 6); y = y % 7; y = y | 1; y = y >> 0;
                  ref[i] = y;
              }
              std::for_each(std::execution::par, v.begin(), v.end(),
                            [](int& x) { x = (x << 1) ^ (x & 6); x = x % 7; x = x | 1; x = x >> 0; });
              bool ok = std::equal(v.begin(), v.end(), ref.begin());
              std::printf("bit ok=%d v[0]=%d ref[0]=%d v[100]=%d ref[100]=%d\n",
                          ok ? 1 : 0, v[0], ref[0], v[100], ref[100]);
              return ok ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/bit.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_bit.cpp -o /dev/null 2> bit.log || true
          if [ -f bit.spv ]; then
            spirv-val bit.spv || { echo "::error::bitwise SPIR-V failed validation"; exit 1; }
            spirv-dis bit.spv 2>/dev/null | grep -qE "OpBitwiseXor|OpBitwiseAnd|OpShiftLeftLogical|OpSRem" \
              || { echo "::error::bitwise/shift/mod ops not emitted"; exit 1; }
          else
            echo "::error::no bitwise SPIR-V (kernel not generated)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_bit.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_bit 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_bit 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::bitwise kernel was not offloaded"; exit 1; }
          echo "$out" | grep -q "bit ok=1" \
            || { echo "::error::bitwise/shift/mod produced a wrong result"; exit 1; }
          echo "PASS: integer bitwise/shift/modulo offloaded and matches the CPU reference"

      - name: "GATE (branch): if/else in a kernel (OpSelectionMerge)"
        run: |
          # Hardening: a real two-way branch in the callable must lower to structured
          # SPIR-V (OpSelectionMerge before the conditional branch), not invalid code.
          # Values are integer-valued floats so the GPU result is bit-exact vs CPU.
          cat > probe_branch.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <cstdio>
          int main() {
              const int N = 128;
              std::vector<float> v(N), ref(N);
              for (int i = 0; i < N; ++i) { v[i] = (float)i; ref[i] = (i > 5) ? i * 2.0f : i + 1.0f; }
              std::for_each(std::execution::par, v.begin(), v.end(),
                            [](float& x) { if (x > 5.0f) x = x * 2.0f; else x = x + 1.0f; });
              bool ok = std::equal(v.begin(), v.end(), ref.begin());
              std::printf("branch ok=%d v[0]=%.1f v[10]=%.1f\n", ok ? 1 : 0, v[0], v[10]);
              return ok ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/br.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_branch.cpp -o /dev/null 2> br.log || true
          if [ -f br.spv ]; then
            spirv-val br.spv || { echo "::error::branch SPIR-V failed validation"; exit 1; }
            spirv-dis br.spv 2>/dev/null | grep -q "OpSelectionMerge" \
              || { echo "::error::no OpSelectionMerge — branch not structured"; exit 1; }
          else
            echo "::error::no branch SPIR-V (kernel not generated — if/else bailed)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_branch.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_branch 2>&1 | tail -3
