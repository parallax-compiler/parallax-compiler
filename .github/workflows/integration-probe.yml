            || { echo "::error::scan wrong result (block-offset add failed)"; exit 1; }
          echo "PASS: std::inclusive_scan(par) offloaded a multi-block GPU prefix scan"

      - name: "GATE (exclusive_scan): fully-on-GPU exclusive prefix scan (inclusive + shift)"
        run: |
          # exclusive_scan(par,first,last,d_first,init) offloads via the device_exclusive_scan
          # funnel: it inclusive-scans a scratch copy (:scan/:add) then a finalize kernel (:shift)
          # writes out[i] = init + (i>0 ? incl[i-1] : 0). Fully on-GPU (no host shift). 1000 ones,
          # init=0 -> out[i]=i, so out[0]=0, out[1]=1, out[256]=256, out[999]=999.
          cat > probe_exscan.cpp <<'EOF'
          #include <vector>
          #include <numeric>
          #include <execution>
          #include <cstdio>
          int main() {
              std::vector<float> v(1000, 1.0f), o(1000, -1.0f);
              std::exclusive_scan(std::execution::par, v.begin(), v.end(), o.begin(), 0.0f);
              std::printf("exscan o[0]=%.1f o[1]=%.1f o[256]=%.1f o[999]=%.1f exp 0/1/256/999\n",
                          o[0], o[1], o[256], o[999]);
              bool ok = (o[0]==0.0f) && (o[1]==1.0f) && (o[256]==256.0f) && (o[999]==999.0f);
              return ok ? 0 : 1;
          }
          EOF
          cp probe_exscan.cpp work_exscan.cpp
          FLAGS="-std=c++20 -I parallax-runtime/include -include parallax/stdpar.hpp \
            -Xclang -load -Xclang $PLUGIN -Xclang -plugin -Xclang parallax"
          PARALLAX_TRANSPARENT=1 "$CLANGXX" $FLAGS -c work_exscan.cpp -o /dev/null 2> ex1.log || true
          echo "routed refs: $(grep -c 'parallax::exclusive_scan' work_exscan.cpp)"
          grep -q 'parallax::exclusive_scan' work_exscan.cpp \
            || { echo '::error::transparent routing did NOT rewrite std::exclusive_scan'; exit 1; }
          PARALLAX_DUMP_SPIRV_SHIFT="$PWD/exshift.spv" PARALLAX_TRANSPARENT=1 "$CLANGXX" $FLAGS \
            -c work_exscan.cpp -o /dev/null 2> ex2.log || true
          echo "registrars: $(grep -c 'parallax_kernel_register' work_exscan.cpp)"
          grep -aE 'device_exclusive_scan<' ex2.log | head -1
          grep -q 'parallax_kernel_register' work_exscan.cpp \
            || { echo '::error::exclusive_scan funnel did not register kernels'; exit 1; }
          [ -f exshift.spv ] && { spirv-val exshift.spv || { echo "::error::shift SPIR-V invalid"; exit 1; }; }
          "$CLANGXX" -std=c++20 -O2 -include parallax/stdpar.hpp work_exscan.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime -o probe_exscan 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(PARALLAX_DEBUG=1 ./probe_exscan 2>&1)" || true
          echo "$out" | grep -aE "exscan o\[|Successfully loaded kernel|MISS" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::exclusive_scan was not offloaded"; exit 1; }
          echo "$out" | grep -q "exscan o\[0\]=0.0 o\[1\]=1.0 o\[256\]=256.0 o\[999\]=999.0" \
            || { echo "::error::exclusive_scan produced a wrong result"; exit 1; }
          echo "PASS: std::exclusive_scan(par) offloaded fully on the GPU (inclusive + shift)"

      - name: "GATE (sort): std::sort(par) offloads a bitonic sort"
        run: |
          # Phase 5: the plugin detects std::sort, emits a bitonic compare-exchange
          # kernel (data@0, push {count,k,j}), and replaces the call with a
          # parallax_sort that pads to a power of two, sorts on the GPU, and copies
          # back. 1000 elements (non-pow2 -> padded to 1024) in a scrambled order;
          # the result must be fully ascending and a permutation (sum preserved).
          cat > probe_sort.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <numeric>
          #include <iterator>
          #include <limits>
          #include <execution>
          #include <cstdio>
          int main() {
              const int N = 1000;
              std::vector<float> v(N);
              long want = 0;
              for (int i = 0; i < N; ++i) { v[i] = static_cast<float>((i * 7 + 3) % N); want += (long)v[i]; }
              std::sort(std::execution::par, v.begin(), v.end());
              bool asc = std::is_sorted(v.begin(), v.end());
              long got = 0; for (float x : v) got += (long)x;
              std::printf("sort asc=%d v[0]=%.1f v[%d]=%.1f sum=%ld want=%ld\n",
                          asc ? 1 : 0, v[0], N - 1, v[N - 1], got, want);
              return (asc && got == want) ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV="$PWD/sort.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_sort.cpp -o /dev/null 2> sort.log || true
          grep -E "sort: generated bitonic" sort.log | head -1 || true
          if [ -f sort.spv ]; then
            spirv-val sort.spv || { echo "::error::sort SPIR-V failed validation"; exit 1; }
            spirv-dis sort.spv 2>/dev/null | grep -q "OpBitwiseXor" \
              || { echo "::error::sort kernel missing the i^j partner (OpBitwiseXor)"; exit 1; }
          else
            echo "::error::no sort SPIR-V produced (std::sort not detected)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_sort.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_sort 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_sort 2>&1)" || true
          echo "$out" | grep -v "^\[" | head
          echo "$out" | grep -q "Successfully loaded kernel" \
            || { echo "::error::sort kernel was not offloaded"; exit 1; }
          echo "$out" | grep -q "sort asc=1" \
            || { echo "::error::sort result not ascending / not a permutation"; exit 1; }
          echo "PASS: std::sort(par) offloaded a GPU bitonic sort (padded, ascending)"

      - name: "GATE (copy_if): stream compaction on the GPU"
        run: |
          # Phase 5: the plugin detects std::copy_if, compiles the predicate into a
          # flags kernel (1.0/0.0), and emits scan + scatter; the runtime runs
          # flags -> inclusive scan -> scatter. Keep x>0.5 over [0..999] drops index 0,
          # so kept=999 and the compacted output is [1,2,...,999].
          cat > probe_copyif.cpp <<'EOF'
          #include <vector>
          #include <algorithm>
          #include <execution>
          #include <iterator>
          #include <cstdio>
          int main() {
              const int N = 1000;
              std::vector<float> v(N), out(N, -1.0f);
              for (int i = 0; i < N; ++i) v[i] = (float)i;
              auto end = std::copy_if(std::execution::par, v.begin(), v.end(), out.begin(),
                                      [](float x){ return x > 0.5f; });
              size_t kept = (size_t)std::distance(out.begin(), end);
              std::printf("copy_if kept=%zu out[0]=%.1f out[998]=%.1f\n", kept, out[0], out[998]);
              bool ok = (kept == 999) && (out[0] == 1.0f) && (out[998] == 999.0f);
              return ok ? 0 : 1;
          }
          EOF
          PARALLAX_DUMP_SPIRV_SCATTER="$PWD/scat.spv" "$CLANGXX" -std=c++20 -I parallax-runtime/include \
            -Xclang -load -Xclang "$PLUGIN" -Xclang -plugin -Xclang parallax \
            -c probe_copyif.cpp -o /dev/null 2> ci.log || true
          grep -E "copy_if: generated" ci.log | head -1 || true
          if [ -f scat.spv ]; then
            spirv-val scat.spv || { echo "::error::scatter SPIR-V failed validation"; exit 1; }
          else
            echo "::error::no scatter SPIR-V produced (std::copy_if not detected)"; exit 1
          fi
          "$CLANGXX" -std=c++20 -O2 probe_copyif.cpp \
            -I parallax-runtime/include -L parallax-runtime/out -lparallax-runtime \
            -o probe_copyif 2>&1 | tail -3
          export LD_LIBRARY_PATH="$PWD/parallax-runtime/out:$LD_LIBRARY_PATH"
          out="$(./probe_copyif 2>&1)" || true
